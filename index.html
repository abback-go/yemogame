    basement: { base:"#22201c", top:"#33302a" },
    school:   { base:"#3b2c1d", top:"#5a4126" },
    town:     { base:"#4a3d33", top:"#6b5a45" },
    harbor:   { base:"#5a4130", top:"#7a5738" },
    forest:   { base:"#2d3b2d", top:"#4a6741" },
    volcano:  { base:"#2e1712", top:"#5a2418" },
    coast:    { base:"#5a4130", top:"#7a5738" },
    snow:     { base:"#6a7488", top:"#c8d4e2" },
    ice:      { base:"#3a5578", top:"#9ec8e8" },
    mine:     { base:"#221f38", top:"#3a3560" },
    forge:    { base:"#3a2418", top:"#5a3a22" },
    garden:   { base:"#4a6b4a", top:"#7aa87a" },
    ash:      { base:"#2a2a30", top:"#48484f" },
    temple:   { base:"#3a2c16", top:"#6a5228" },
  };
  const vlx = camX - 20, vrx = camX + VIEW_W + 20;
  const organic = mapTheme==="forest"||mapTheme==="garden";
  const snowy = mapTheme==="snow"||mapTheme==="ice";
  for(const pf of platforms){
    const g = GT[mapTheme] || GT.forest;
    const cx0 = Math.max(pf.x, vlx), cx1 = Math.min(pf.x + pf.w, vrx);
    if(cx1 <= cx0) continue;
    if(pf.solidGround){
      // 본체 그라데이션
      const bg = ctx.createLinearGradient(0, pf.y, 0, pf.y + Math.min(pf.h, 200));
      bg.addColorStop(0, g.top); bg.addColorStop(0.18, g.base);
      bg.addColorStop(1, shade(g.base, -0.35));
      ctx.fillStyle = bg; ctx.fillRect(cx0, pf.y, cx1 - cx0, pf.h);
      // 상단 밴드 + 하이라이트 라인
      ctx.fillStyle = g.top; ctx.fillRect(cx0, pf.y, cx1 - cx0, 8);
      ctx.fillStyle = shade(g.top, 0.4); ctx.fillRect(cx0, pf.y, cx1 - cx0, 2);
      // 세로 결(질감)
      ctx.fillStyle = "rgba(0,0,0,.16)";
      const step = mapTheme === "harbor" || mapTheme === "coast" ? 40 : 90;
      for(let bx = Math.ceil(cx0/step)*step; bx < cx1; bx += step) ctx.fillRect(bx, pf.y + 8, 2, pf.h - 8);
      // 유기물 디테일 (풀/눈 캡)
      if(organic || snowy){
        for(let bx = Math.ceil(cx0/26)*26; bx < cx1; bx += 26){
          const h = 4 + ((bx*7)%6);
          ctx.fillStyle = organic ? (((bx*13)%2) ? "#5a8a4a" : "#6ba055") : "rgba(255,255,255,.85)";
          if(organic){ ctx.fillRect(bx, pf.y - h, 2, h); ctx.fillRect(bx+4, pf.y - h*0.7, 2, h*0.7); }
          else ctx.fillRect(bx-2, pf.y - 2, 8, 3);
        }
      }
    }else{
      // 원웨이 발판 — 둥근 느낌 + 그림자
      ctx.fillStyle = "rgba(0,0,0,.28)"; roundRect(cx0, pf.y+2, cx1-cx0, pf.h, 4); ctx.fill();
      const bg = ctx.createLinearGradient(0, pf.y, 0, pf.y+pf.h);
      bg.addColorStop(0, g.top); bg.addColorStop(1, g.base);
      ctx.fillStyle = bg; roundRect(cx0, pf.y, cx1-cx0, pf.h, 4); ctx.fill();
      ctx.fillStyle = shade(g.top, 0.35); ctx.fillRect(cx0+3, pf.y+1, cx1-cx0-6, 2);
      if(organic){ ctx.fillStyle = "#5a8a4a";
        for(let bx = Math.ceil(cx0/22)*22; bx < cx1-4; bx += 22){ const h=3+((bx*5)%4); ctx.fillRect(bx, pf.y-h, 2, h); } }
    }
  }

  // --- 계단(대각선) 렌더
  for(const s of stairs){
    const xa = Math.min(s.x0, s.x1), xb = Math.max(s.x0, s.x1);
    const ya = (xa === s.x0) ? s.y0 : s.y1, yb = (xb === s.x0) ? s.y0 : s.y1;
    const steps = Math.max(4, Math.round((xb - xa) / 42));
    for(let i = 0; i < steps; i++){
      const t0 = i / steps, t1 = (i + 1) / steps;
      const sx = xa + (xb - xa) * t0, sy = ya + (yb - ya) * t0;
      const nx = xa + (xb - xa) * t1;
      ctx.fillStyle = "#43301e";
      ctx.fillRect(sx, sy, (nx - sx) + 2, 14);                 // 디딤판
      ctx.fillStyle = "#5a4126";
      ctx.fillRect(sx, sy, (nx - sx) + 2, 5);
      ctx.fillStyle = "#2c2013";
      ctx.fillRect(sx, sy + 14, (nx - sx) + 2, (yb > ya ? 0 : (ya - yb) / steps) + 6); // 옆판
    }
    // 난간
    ctx.strokeStyle = "#6a4c2c"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(s.x0, s.y0 - 40); ctx.lineTo(s.x1, s.y1 - 40); ctx.stroke();
  }

  // --- 안내판 (작은 나무 팻말 + 근접 시에만 문구 툴팁)
  ctx.textAlign = "center";
  for(const s of signs){
    const sy = s.y ?? mapGroundY;
    const near = Math.abs(player.x - s.x) < 150 && Math.abs((player.y) - sy) < 200;
    // 기둥
    ctx.fillStyle = "#5a4126"; ctx.fillRect(s.x - 3, sy - 40, 6, 40);
    ctx.fillStyle = "#3e2c17"; ctx.fillRect(s.x - 3, sy - 40, 2, 40);
    // 팻말 (작은 나무판 + 화살표 아이콘)
    ctx.fillStyle = "#7a5a34"; roundRect(s.x - 16, sy - 62, 32, 22, 3); ctx.fill();
    ctx.strokeStyle = "#4a3418"; ctx.lineWidth = 2; roundRect(s.x - 16, sy - 62, 32, 22, 3); ctx.stroke();
    ctx.fillStyle = "#e8c98a"; ctx.font = "bold 14px sans-serif"; ctx.fillText("!", s.x, sy - 46);
    // 근접 시 문구 (부드럽게 페이드)
    const a = near ? 1 : 0;
    if(s._a === undefined) s._a = 0;
    s._a += (a - s._a) * 0.2;
    if(s._a > 0.02){
      ctx.save(); ctx.globalAlpha = s._a;
      ctx.font = "600 14px 'Trebuchet MS',sans-serif";
      const w = ctx.measureText(s.text).width + 28;
      const bx = clamp(s.x, camX + w/2 + 8, camX + VIEW_W - w/2 - 8);
      const by = sy - 96;
      ctx.fillStyle = "rgba(14,16,28,.92)"; roundRect(bx - w/2, by - 20, w, 30, 8); ctx.fill();
      ctx.strokeStyle = "rgba(180,150,90,.5)"; ctx.lineWidth = 1.5; roundRect(bx - w/2, by - 20, w, 30, 8); ctx.stroke();
      // 말풍선 꼬리
      ctx.fillStyle = "rgba(14,16,28,.92)"; ctx.beginPath();
      ctx.moveTo(s.x-6, by+9); ctx.lineTo(s.x+6, by+9); ctx.lineTo(s.x, by+18); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#f0e6d0"; ctx.fillText(s.text, bx, by);
      ctx.restore();
    }
  }

  // --- 포탈
  for(const p of portals){
    const py = p.y ?? mapGroundY;
    const pulse = 0.6 + Math.sin(performance.now()/300) * 0.25;
    const tint = p.tint || "#8b5cf6";
    if(p.door){
      // 건물 출입문
      ctx.fillStyle = "#2a1f16"; ctx.fillRect(p.x - 40, py - 152, 80, 152);
      ctx.fillStyle = "#5a3f26"; ctx.fillRect(p.x - 34, py - 146, 68, 146);
      ctx.fillStyle = "#43301e";
      ctx.fillRect(p.x - 30, py - 142, 27, 140); ctx.fillRect(p.x + 3, py - 142, 27, 140);
      ctx.fillStyle = "#caa24a";
      ctx.beginPath(); ctx.arc(p.x - 7, py - 72, 4, 0, Math.PI*2); ctx.arc(p.x + 7, py - 72, 4, 0, Math.PI*2); ctx.fill();
      ctx.save(); ctx.globalCompositeOperation = "lighter"; ctx.globalAlpha = pulse * 0.5;
      const dg = ctx.createRadialGradient(p.x, py - 78, 4, p.x, py - 78, 64);
      dg.addColorStop(0, tint); dg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = dg; ctx.beginPath(); ctx.arc(p.x, py - 78, 64, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }else{
      ctx.fillStyle = mapTheme === "campus" ? "#565f7d" : mapTheme === "basement" ? "#2d2a24" : "#5b4636";
      ctx.fillRect(p.x - 44, py - 130, 12, 130);
      ctx.fillRect(p.x + 32, py - 130, 12, 130);
      ctx.fillRect(p.x - 50, py - 142, 100, 14);
      if(p.down){
        ctx.fillStyle = "#0a0b0f";
        ctx.fillRect(p.x - 32, py - 128, 64, 128);
        ctx.fillStyle = "rgba(0,0,0,.55)";
        for(let s = 0; s < 5; s++) ctx.fillRect(p.x - 30 + s*4, py - 24 - s*22, 60 - s*8, 8);
      }
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = pulse;
      const pg = ctx.createRadialGradient(p.x, py - 65, 4, p.x, py - 65, 46);
      pg.addColorStop(0, "#ffffff");
      pg.addColorStop(0.4, tint);
      pg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.ellipse(p.x, py - 65, 34, 58, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.textAlign = "center";
    ctx.font = "bold 13px sans-serif"; ctx.fillStyle = "#c4b5fd";
    ctx.fillText(p.label, p.x, py - 152);
    if(!dialog && !transition && Math.abs(player.x - p.x) < 46 && Math.abs(player.y - py) < 90){
      ctx.fillStyle = "rgba(10,12,24,.8)";
      roundRect(p.x - 44, py - 186, 88, 22, 6); ctx.fill();
      ctx.fillStyle = "#8be9fd";
      ctx.fillText(p.door ? "↑ 들어가기" : p.down ? "↑ 내려가기" : "↑ 이동", p.x, py - 170);
    }
  }

  // --- 숲: 시험장 가시문 / 아레나 벽 / 가시 / 씨앗
  if(curMapId === "forest"){
    if(!boss.defeated && !bossReady()){
      drawThornWall(GATE_X);
      ctx.textAlign = "center";
      ctx.font = "bold 13px sans-serif"; ctx.fillStyle = "#f0abfc";
      ctx.fillText("시험 자격 필요 — 퀘스트를 모두 완료하자", GATE_X, mapGroundY - 190);
    }
    if(boss.active && BOSS_M && !BOSS_M.dead){
      drawThornWall(ARENA_L);
      drawThornWall(ARENA_R);
    }
    for(const s of spikes){
      if(s.warn > 0){
        const pulse = 0.35 + Math.abs(Math.sin(performance.now()/90)) * 0.35;
        ctx.fillStyle = `rgba(239,68,68,${pulse})`;
        ctx.fillRect(s.x - 46, mapGroundY - 6, 92, 6);
        ctx.textAlign = "center";
        ctx.font = "bold 18px sans-serif"; ctx.fillStyle = "#ef4444";
        ctx.fillText("!", s.x, mapGroundY - 14);
      }else if(s.active > 0){
        const hgt = 72 * Math.min(1, s.active / 0.32);
        ctx.fillStyle = "#5e7a4a";
        for(let ti = -1; ti <= 1; ti++){
          ctx.beginPath();
          ctx.moveTo(s.x + ti*26 - 12, mapGroundY);
          ctx.lineTo(s.x + ti*26, mapGroundY - hgt * (ti === 0 ? 1 : 0.7));
          ctx.lineTo(s.x + ti*26 + 12, mapGroundY);
          ctx.closePath(); ctx.fill();
        }
      }
    }
    for(const e of eprojs){
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const eg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r*2);
      eg.addColorStop(0, "#d9f99d");
      eg.addColorStop(0.5, "#84cc16");
      eg.addColorStop(1, "rgba(90,140,40,0)");
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r*2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // --- 지하실: 횃불 + 의문의 문
  if(curMapId === "basement"){
    for(const tx of mapTorches){
      const ty = mapGroundY - 250;
      // 브래킷
      ctx.fillStyle = "#3a3128";
      ctx.fillRect(tx - 3, ty, 6, 30);
      ctx.fillStyle = "#2a2018";
      ctx.fillRect(tx - 7, ty + 28, 14, 6);
      // 불꽃
      const fl = 4 + Math.sin(performance.now()/70 + tx) * 2;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const fg = ctx.createRadialGradient(tx, ty - 6, 2, tx, ty - 6, 60 + fl*3);
      fg.addColorStop(0, "rgba(255,220,150,.9)");
      fg.addColorStop(0.25, "rgba(255,140,50,.5)");
      fg.addColorStop(1, "rgba(255,90,20,0)");
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(tx, ty - 6, 60 + fl*3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#ffe08a";
      ctx.beginPath();
      ctx.moveTo(tx - 5, ty); ctx.lineTo(tx, ty - 16 - fl); ctx.lineTo(tx + 5, ty);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      if(Math.random() < 0.15)
        spawnParticles(tx, ty - 12, { n: 1, col: ["#ffb35c","#ffd27f"], sp0: 6, sp1: 26, l0: .4, l1: .9, add: true, grav: -50, r0: 1, r1: 2 });
    }
    if(mapDoor) drawMysteryDoor(mapDoor.x);
    if(questState.idx === QI_TOME) drawTome();
  }

  // --- 도서관: 금서 구역 서가
  if(curMapId === "library") drawBannedShelf();

  // --- 불의 마을: 『멸화의 불씨』 회수 지점
  if(curMapId === "firevil" && questState.idx === QI_M2_EMBER) drawEmberPickup();

  // --- 범용 퀘스트 수집 지점 (교과서·목걸이 등)
  { const q = curQuest(); if(q && q.type === "inspect" && q.spot && q.spot.map === curMapId) drawQuestSpot(q.spot); }

  // --- 존 기믹 (레일·상승기류·벽·균열암벽·화로·사당·재의 장막)
  drawZoneGimmicks();

  // --- 화염 장판
  for(const f of fields){
    const fdur = f.dur ?? SKILL.field.dur;
    const flick = 0.75 + Math.sin(f.t*30)*0.15;
    const fade = f.t > fdur - 0.5 ? (fdur - f.t)/0.5 : 1;
    const fh = 34 + (f.tier||0)*8;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = 0.55 * flick * fade;
    const fg = ctx.createLinearGradient(0, f.y - fh, 0, f.y);
    if(f.tier === 2){
      fg.addColorStop(0, "rgba(90,160,255,0)");
      fg.addColorStop(1, "#5ab0ff");
    }else{
      fg.addColorStop(0, "rgba(255,140,40,0)");
      fg.addColorStop(1, f.tier === 1 ? "#ffa54a" : "#ff8c3a");
    }
    ctx.fillStyle = fg;
    ctx.fillRect(f.x - f.w/2, f.y - fh, f.w, fh);
    ctx.restore();
  }

  // --- NPC (교사·양호·매점·안내·주민 등)
  for(const n of npcs) drawNPC(n);

  // --- 몬스터
  for(const m of monsters){
    if(m.dead) continue;
    const d = MOB_DEFS[m.type];
    const r = mobRect(m);
    const squish = m.type === "slime" ? Math.sin(m.animT * 6) * 3 : 0;
    ctx.fillStyle = m.hurtFlash > 0 ? "#ffffff" : d.color;
    if(m.type === "boss"){
      const tele = boss.active && boss.state.startsWith("windup") && Math.floor(performance.now()/90) % 2 === 0;
      const p2 = bossPhase2();
      const flash = m.hurtFlash > 0 || tele;
      const sway = Math.sin(m.animT * 1.6) * 3;
      ctx.fillStyle = flash ? "#fff" : "#4a3b28";
      ctx.fillRect(m.x - 30, m.y - d.h + 26, 60, d.h - 26);
      ctx.fillStyle = flash ? "#fff" : "#3d3122";
      ctx.fillRect(m.x - 30 - 18, m.y - d.h + 44 + sway, 20, 54);
      ctx.fillRect(m.x + 30 - 2,  m.y - d.h + 44 - sway, 20, 54);
      ctx.fillStyle = flash ? "#fff" : (p2 ? "#6b8747" : d.color);
      ctx.beginPath();
      ctx.ellipse(m.x, m.y - d.h + 18, 52, 30, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.save();
      if(p2) ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = p2 ? "#ff5040" : "#ffd93d";
      ctx.fillRect(m.x - 14 + m.dir*4, m.y - d.h + 40, 8, 9);
      ctx.fillRect(m.x + 6 + m.dir*4,  m.y - d.h + 40, 8, 9);
      ctx.restore();
      if(m.hp < m.maxHp * 0.75){
        ctx.strokeStyle = "rgba(255,220,120,.5)"; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(m.x - 10, m.y - 60); ctx.lineTo(m.x + 2, m.y - 40); ctx.lineTo(m.x - 6, m.y - 20);
        ctx.stroke();
      }
    }else if(m.type === "dummy"){
      ctx.fillStyle = "#7a5a33";
      ctx.fillRect(m.x - 5, m.y - d.h, 10, d.h);
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#c8a35f";
      ctx.fillRect(m.x - 16, m.y - d.h, 32, 26);
      ctx.fillStyle = "#3a2c17";
      ctx.fillRect(m.x - 10, m.y - d.h + 8, 5, 5);
      ctx.fillRect(m.x + 5,  m.y - d.h + 8, 5, 5);
    }else if(m.type === "slime"){
      ctx.beginPath();
      ctx.ellipse(m.x, m.y - d.h/2, d.w/2 + squish, d.h/2 - squish*0.6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.fillRect(m.x - 8 + m.dir*3, m.y - d.h/2 - 4, 4, 6);
      ctx.fillRect(m.x + 4 + m.dir*3, m.y - d.h/2 - 4, 4, 6);
    }else if(m.type === "bat"){
      const flap = Math.sin(m.animT * 12) * 7;
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#2a2438";
      // 날개
      ctx.beginPath();
      ctx.moveTo(m.x, m.y - 10);
      ctx.lineTo(m.x - 20, m.y - 17 - flap);
      ctx.lineTo(m.x - 14, m.y - 8);
      ctx.lineTo(m.x - 7, m.y - 11);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(m.x, m.y - 10);
      ctx.lineTo(m.x + 20, m.y - 17 - flap);
      ctx.lineTo(m.x + 14, m.y - 8);
      ctx.lineTo(m.x + 7, m.y - 11);
      ctx.closePath(); ctx.fill();
      // 몸통
      ctx.beginPath(); ctx.ellipse(m.x, m.y - 9, 7, 8, 0, 0, Math.PI*2); ctx.fill();
      // 귀
      ctx.beginPath();
      ctx.moveTo(m.x - 5, m.y - 15); ctx.lineTo(m.x - 3, m.y - 22); ctx.lineTo(m.x - 1, m.y - 15);
      ctx.moveTo(m.x + 5, m.y - 15); ctx.lineTo(m.x + 3, m.y - 22); ctx.lineTo(m.x + 1, m.y - 15);
      ctx.fill();
      // 눈
      ctx.fillStyle = m.hurtFlash > 0 ? "#000" : "#ff5a5a";
      ctx.fillRect(m.x - 4, m.y - 11, 2, 3);
      ctx.fillRect(m.x + 2, m.y - 11, 2, 3);
    }else if(m.type === "ember"){
      const cy = m.y - d.h/2, fl = Math.sin(m.animT * 10) * 3;
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const g = ctx.createRadialGradient(m.x, cy, 2, m.x, cy, 26);
      g.addColorStop(0, m.hurtFlash > 0 ? "rgba(255,255,255,.95)" : "rgba(255,220,150,.9)");
      g.addColorStop(0.5, "rgba(255,120,40,.5)"); g.addColorStop(1, "rgba(255,60,20,0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, cy, 26, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#ffd27f";
      ctx.beginPath();
      ctx.moveTo(m.x, cy - 16 - fl); ctx.lineTo(m.x + 9, cy + 8); ctx.lineTo(m.x - 9, cy + 8);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#3a1206";
      ctx.fillRect(m.x - 5 + m.dir*2, cy - 2, 3, 4);
      ctx.fillRect(m.x + 2 + m.dir*2, cy - 2, 3, 4);
    }else if(m.type === "firelord"){
      const flash = m.hurtFlash > 0;
      const sway = Math.sin(m.animT * 2) * 3;
      // 후광
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const g = ctx.createRadialGradient(m.x, m.y - d.h/2, 8, m.x, m.y - d.h/2, 90);
      g.addColorStop(0, "rgba(255,120,40,.6)"); g.addColorStop(1, "rgba(255,50,20,0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, m.y - d.h/2, 90, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // 몸통(용암 갑주)
      ctx.fillStyle = flash ? "#fff" : "#3a140c";
      ctx.fillRect(m.x - 32, m.y - d.h + 30, 64, d.h - 30);
      ctx.fillStyle = flash ? "#fff" : "#5a1e10";
      ctx.fillRect(m.x - 32 - 16, m.y - d.h + 50 + sway, 20, 58);
      ctx.fillRect(m.x + 32 - 4,  m.y - d.h + 50 - sway, 20, 58);
      // 용암 균열
      ctx.save(); if(!flash) ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = flash ? "#fff" : "#ff7b3a"; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(m.x - 18, m.y - d.h + 44); ctx.lineTo(m.x - 4, m.y - d.h + 74); ctx.lineTo(m.x - 14, m.y - 40);
      ctx.moveTo(m.x + 16, m.y - d.h + 50); ctx.lineTo(m.x + 4, m.y - d.h + 84);
      ctx.stroke();
      ctx.restore();
      // 머리(뿔 투구)
      ctx.fillStyle = flash ? "#fff" : "#4a1810";
      ctx.beginPath(); ctx.ellipse(m.x, m.y - d.h + 16, 30, 24, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(m.x - 24, m.y - d.h + 6); ctx.lineTo(m.x - 40, m.y - d.h - 22); ctx.lineTo(m.x - 12, m.y - d.h - 2);
      ctx.moveTo(m.x + 24, m.y - d.h + 6); ctx.lineTo(m.x + 40, m.y - d.h - 22); ctx.lineTo(m.x + 12, m.y - d.h - 2);
      ctx.fill();
      // 눈
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = flash ? "#fff" : "#ffd93d";
      ctx.fillRect(m.x - 15 + m.dir*3, m.y - d.h + 12, 9, 7);
      ctx.fillRect(m.x + 6 + m.dir*3,  m.y - d.h + 12, 9, 7);
      ctx.restore();
    }else{
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#e8d8b0";
      ctx.fillRect(r.x + 6, r.y + 14, d.w - 12, d.h - 14);
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : d.color;
      ctx.beginPath();
      ctx.ellipse(m.x, r.y + 12, d.w/2 + 6, 14, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.fillRect(m.x - 8 + m.dir*3, r.y + 20, 4, 6);
      ctx.fillRect(m.x + 4 + m.dir*3, r.y + 20, 4, 6);
    }
    if(m.hpBarTimer > 0 && m.type !== "dummy" && m.type !== "boss"){
      const bw = 44;
      ctx.fillStyle = "rgba(0,0,0,.6)";
      ctx.fillRect(m.x - bw/2, r.y - 14, bw, 6);
      ctx.fillStyle = "#ef4444";
      ctx.fillRect(m.x - bw/2, r.y - 14, bw * clamp(m.hp / m.maxHp, 0, 1), 6);
    }
  }

  // --- 플레이어
  drawPlayer();
  if(gameState !== "title" && player.infernoOn) drawInfernoBeam();

  // --- 멸화 운석 (월드 좌표)
  if(meteors.length) drawMeteors();

  // --- 투사체
  for(const pr of projectiles){
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    // 스킬 레벨 티어별 색: 0=주황, 1=밝은 금빛, 2(MAX)=푸른 화염
    const tier = pr.tier || 0;
    const core = tier === 2 ? "#eef7ff" : "#fff3d6";
    const mid  = tier === 2 ? "#7cc4ff" : tier === 1 ? "#ffd27f" : "#ffb35c";
    const edge = tier === 2 ? "rgba(80,140,255,0)" : "rgba(255,100,30,0)";
    const glowMul = 2.2 + tier * 0.35;
    if(pr.type === "lance"){
      const g = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, pr.r*3);
      g.addColorStop(0, core);
      g.addColorStop(0.4, tier === 2 ? "#5ab0ff" : "#ff9d4d");
      g.addColorStop(1, edge);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(pr.x, pr.y, pr.r*(3.4 + tier*0.4), pr.r*1.3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = tier === 2 ? "#dceeff" : "#fff0c0";
      ctx.beginPath();
      ctx.ellipse(pr.x + sign(pr.vx)*pr.r*1.6, pr.y, pr.r*1.4, pr.r*0.6, 0, 0, Math.PI*2);
      ctx.fill();
    }else{
      const g = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, pr.r*glowMul);
      g.addColorStop(0, core);
      g.addColorStop(0.4, mid);
      g.addColorStop(1, edge);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r*glowMul, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // --- 폭발 링
  for(const e of explosions){
    const k = e.t / e.life;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = `rgba(${e.col || "255,170,80"},${1-k})`;
    ctx.lineWidth = 6 * (1-k) + 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.4 + k*0.6), 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // --- 파티클
  for(const p of particles){
    const k = 1 - p.t / p.life;
    ctx.save();
    if(p.add) ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = k;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * k, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // --- 데미지 넘버 (옵션으로 끌 수 있음)
  if(OPTS.dmgNum) for(const n of dmgNumbers){
    const k = n.t / n.life;
    const y = n.y - k*46;
    const scale = n.crit ? (k < 0.15 ? lerp(1.8, 1.2, k/0.15) : 1.2) : 1;
    ctx.save();
    ctx.globalAlpha = 1 - k*k;
    ctx.font = `bold ${Math.floor((n.crit?26:19)*scale)}px sans-serif`;
    ctx.textAlign = "center";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.7)";
    ctx.strokeText(n.val, n.x, y);
    ctx.fillStyle = n.crit ? "#ffb020" : "#ffe9c9";
    ctx.fillText(n.val, n.x, y);
    ctx.restore();
  }

  // --- 플로팅 텍스트
  for(const f of floatTexts){
    const k = f.t / f.life;
    ctx.save();
    ctx.globalAlpha = 1 - k*k;
    ctx.font = "bold 17px sans-serif";
    ctx.textAlign = "center";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.7)";
    ctx.strokeText(f.text, f.x, f.y - k*40);
    ctx.fillStyle = f.col;
    ctx.fillText(f.text, f.x, f.y - k*40);
    ctx.restore();
  }

  ctx.restore();

  if(juice.flash > 0){
    ctx.fillStyle = `rgba(255,240,200,${juice.flash})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  // 멸화: 하늘이 붉게 갈라지는 오버레이
  if(meltFlash > 0){
    const tier = skillTier("meltdown");
    ctx.fillStyle = tier === 2 ? `rgba(120,180,255,${meltFlash * 0.28})` : `rgba(255,70,30,${meltFlash * 0.3})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    const vg = ctx.createRadialGradient(VIEW_W/2, VIEW_H*0.4, 120, VIEW_W/2, VIEW_H*0.4, VIEW_W*0.7);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, tier === 2 ? `rgba(20,40,90,${meltFlash*0.5})` : `rgba(90,15,10,${meltFlash*0.5})`);
    ctx.fillStyle = vg; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  if(player.hurtFlash > 0){
    ctx.fillStyle = `rgba(220,40,40,${player.hurtFlash * 0.5})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }

  // ── 분위기 후처리 (컬러 그레이드 · 갓레이 · 소프트 비네트) ──
  if(gameState === "play"){
    const art = themeArt();
    // 갓레이 (정원·신전 등 밝은 성역)
    if(art.rays){
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      for(let i=0;i<5;i++){
        const rx = VIEW_W*(0.2+i*0.16) + Math.sin(performance.now()/4000+i)*30;
        const g = ctx.createLinearGradient(rx, 0, rx-160, VIEW_H);
        g.addColorStop(0, "rgba(255,250,220,.06)"); g.addColorStop(1, "rgba(255,250,220,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.moveTo(rx,0); ctx.lineTo(rx+80,0); ctx.lineTo(rx-80,VIEW_H); ctx.lineTo(rx-200,VIEW_H); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
    // 컬러 그레이드 (테마 무드)
    ctx.save(); ctx.globalCompositeOperation = "soft-light";
    ctx.fillStyle = art.grade; ctx.fillRect(0,0,VIEW_W,VIEW_H);
    ctx.restore();
    // 상단 광원 글로우 (야외 존)
    if(art.light !== "rgba(0,0,0,0)"){
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const lg = ctx.createLinearGradient(0,0,0,VIEW_H*0.5);
      lg.addColorStop(0, art.light); lg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = lg; ctx.fillRect(0,0,VIEW_W,VIEW_H*0.5);
      ctx.restore();
    }
    // 소프트 비네트 (모든 맵) — 어둠 존은 별도 강한 비네트가 아래에서 추가
    const vg = ctx.createRadialGradient(VIEW_W/2, VIEW_H*0.46, VIEW_H*0.32, VIEW_W/2, VIEW_H*0.5, VIEW_H*0.95);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, mapTheme==="garden"||mapTheme==="snow" ? "rgba(20,26,40,.28)" : "rgba(6,7,16,.46)");
    ctx.fillStyle = vg; ctx.fillRect(0,0,VIEW_W,VIEW_H);
  }

  // 어둠 비네트 (지하실·광산) — 도깨비불 켜면 시야 확대
  if(mapTheme === "basement" || mapTheme === "mine"){
    const plsx = player.x - camX, plsy = player.y - camY - 40;
    const rad = player.wispOn ? 460 : (mapTheme === "mine" ? 300 : 260);
    const outer = player.wispOn ? 940 : 640;
    const vg = ctx.createRadialGradient(plsx, plsy, rad, plsx, plsy, outer);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(0.6, "rgba(3,4,7,0.4)");
    vg.addColorStop(1, mapTheme === "mine" ? "rgba(4,3,10,0.9)" : "rgba(2,3,5,0.82)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    if(player.wispOn){
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const wg = ctx.createRadialGradient(plsx, plsy, 4, plsx, plsy, 120);
      wg.addColorStop(0, "rgba(165,243,252,.35)"); wg.addColorStop(1, "rgba(165,243,252,0)");
      ctx.fillStyle = wg; ctx.beginPath(); ctx.arc(plsx, plsy, 120, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  // 온기 게이지 (추운 존)
  if(curMap().cold && gameState === "play"){
    const gw = 220, gx = VIEW_W/2 - gw/2, gy = 92;
    ctx.fillStyle = "rgba(10,12,24,.7)"; roundRect(gx-4, gy-4, gw+8, 22, 6); ctx.fill();
    const warm = player.warmth;
    ctx.fillStyle = warm > 0.35 ? "#ff9d4d" : "#ef4444";
    ctx.fillRect(gx, gy, gw*warm, 14);
    ctx.textAlign = "center"; ctx.font = "bold 12px sans-serif"; ctx.fillStyle = "#fff";
    ctx.fillText(warm <= 0 ? "❄ 저체온 위험! 화로에 불을 붙여라" : "🔥 온기", VIEW_W/2, gy - 8);
    if(warm <= 0){ const a = 0.12 + Math.sin(performance.now()/120)*0.06;
      ctx.fillStyle = `rgba(120,180,255,${a})`; ctx.fillRect(0,0,VIEW_W,VIEW_H); }
  }

  if(gameState === "title"){
    renderTitle();
  }else{
    renderHUD();
  }

  // --- 지역명 배너 (진입 시 상단 중앙, 페이드 인/아웃)
  if(areaBanner && gameState === "play"){
    const t = areaBanner.t;
    const a = t < 0.4 ? t/0.4 : t > 3.0 ? Math.max(0, (3.6-t)/0.6) : 1;
    ctx.save(); ctx.globalAlpha = a; ctx.textAlign = "center";
    const cyb = 108;
    // 장식 라인
    ctx.strokeStyle = "rgba(242,196,107,.5)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(VIEW_W/2-150, cyb+14); ctx.lineTo(VIEW_W/2-30, cyb+14);
    ctx.moveTo(VIEW_W/2+30, cyb+14); ctx.lineTo(VIEW_W/2+150, cyb+14); ctx.stroke();
    ctx.fillStyle = "#f2c46b"; ctx.save(); ctx.translate(VIEW_W/2, cyb+14); ctx.rotate(Math.PI/4); ctx.fillRect(-3,-3,6,6); ctx.restore();
    headerText(areaBanner.name, VIEW_W/2, cyb, 26, "#fdf3dd", 2, "center");
    if(areaBanner.tag) headerText(areaBanner.tag, VIEW_W/2, cyb+34, 12, "rgba(200,208,224,.7)", 3, "center");
    ctx.restore();
  }

  // --- 맵 전환 페이드 (부드러운 이징)
  if(transition){
    const raw = transition.phase === "out" ? Math.min(1, transition.t) : Math.max(0, 1 - transition.t);
    const a = raw*raw*(3-2*raw);   // smoothstep
    ctx.fillStyle = `rgba(6,7,16,${a})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
}

function drawTitleBtn(r, label, primary){
  const hover = inRect(mouse.x, mouse.y, r);
  ctx.save();
  const g = ctx.createLinearGradient(0, r.y, 0, r.y+r.h);
  if(primary){ g.addColorStop(0, hover?"#8b5cf6":"#7047d0"); g.addColorStop(1, hover?"#6d3fc0":"#5836a8"); }
  else { g.addColorStop(0, hover?"rgba(50,56,80,.95)":"rgba(30,34,52,.9)"); g.addColorStop(1,"rgba(18,20,34,.92)"); }
  ctx.fillStyle="rgba(0,0,0,.4)"; roundRect(r.x, r.y+3, r.w, r.h, 11); ctx.fill();
  ctx.fillStyle=g; roundRect(r.x, r.y, r.w, r.h, 11); ctx.fill();
  ctx.strokeStyle= primary ? (hover?"#c4b5fd":"#9a7cf0") : (hover?"#7b88a6":"#4a536a");
  ctx.lineWidth=1.5; roundRect(r.x+1, r.y+1, r.w-2, r.h-2, 10); ctx.stroke();
  if(hover){ ctx.save(); ctx.globalCompositeOperation="lighter";
    ctx.fillStyle= primary?"rgba(160,120,255,.12)":"rgba(140,160,200,.08)"; roundRect(r.x,r.y,r.w,r.h,11); ctx.fill(); ctx.restore(); }
  ctx.textAlign="center";
  headerText(label, r.x+r.w/2, r.y+r.h/2+ (primary?7:6), primary?21:16, primary?"#fff":"#c8d0e0", 1.5, "center");
  ctx.restore();
}

function renderMinimap(){
  const bx = VIEW_W - 316, by = 14, bw = 300, bh = 96;
  ctx.save();
  ctx.fillStyle = "rgba(10,12,24,.72)";
  roundRect(bx, by, bw, bh, 10); ctx.fill();
  // 맵 이름
  ctx.textAlign = "left";
  ctx.font = "bold 12px sans-serif"; ctx.fillStyle = "#c4b5fd";
  ctx.fillText(MAPS[curMapId].name, bx + 12, by + 18);
  ctx.textAlign = "right";
  ctx.font = "10px sans-serif"; ctx.fillStyle = "#64748b";
  ctx.fillText("M 월드맵", bx + bw - 10, by + 18);
  // 지도 영역
  const cx0 = bx + 10, cy0 = by + 26, cw = bw - 20, ch = bh - 36;
  const s = Math.min(cw / mapW, ch / mapH);
  const ox = cx0 + (cw - mapW * s) / 2, oy = cy0 + (ch - mapH * s) / 2;
  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.fillRect(cx0, cy0, cw, ch);
  // 지형
  ctx.fillStyle = "#5a637f";
  for(const pf of platforms){
    ctx.fillRect(ox + pf.x * s, oy + pf.y * s, Math.max(1.5, pf.w * s), Math.max(1.5, pf.h * s * 0.6));
  }
  // 계단
  ctx.strokeStyle = "#5a637f"; ctx.lineWidth = 1.5;
  for(const st of stairs){
    ctx.beginPath();
    ctx.moveTo(ox + st.x0 * s, oy + st.y0 * s);
    ctx.lineTo(ox + st.x1 * s, oy + st.y1 * s);
    ctx.stroke();
  }
  // 포탈/문
  for(const p of portals){
    const py2 = p.y ?? mapGroundY;
    ctx.fillStyle = p.tint || "#8b5cf6";
    ctx.beginPath(); ctx.arc(ox + p.x * s, oy + (py2 - 40) * s, 2.4, 0, Math.PI*2); ctx.fill();
  }
  // NPC
  ctx.fillStyle = "#fbbf24";
  for(const n of npcs){
    const ny = n.y ?? mapGroundY;
    ctx.fillRect(ox + n.x * s - 1.5, oy + (ny - 40) * s - 1.5, 3, 3);
  }
  // 몬스터
  for(const m of monsters){
    if(m.dead) continue;
    ctx.fillStyle = m.type === "dummy" ? "#9a7b4f" : m.type === "boss" ? "#ff5040" : "#ef4444";
    ctx.fillRect(ox + m.x * s - 1.5, oy + (m.y - 20) * s - 1.5, m.type === "boss" ? 5 : 3, m.type === "boss" ? 5 : 3);
  }
  // 플레이어 (깜빡임)
  const blink = 0.6 + Math.sin(performance.now()/180) * 0.4;
  ctx.save();
  ctx.globalAlpha = blink;
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(ox + player.x * s, oy + (player.y - 24) * s, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
}

  }
  ctx.restore();

  // 노드
  const cur = worldNodeOf(curMapId);
  for(const n of WORLD_NODES){
    const nx = px2 + n.x, ny = py + n.y;
    const isCur = cur && cur.id === n.id;
    // 현재 위치 링
    if(isCur){
      const pulse = 8 + Math.sin(performance.now()/240) * 3;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = "rgba(139,233,253,.8)"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(nx, ny, 34 + pulse, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    // 노드 박스
    ctx.font = "bold 14px sans-serif";
    const w = Math.max(96, ctx.measureText(n.name).width + 34);
    ctx.fillStyle = isCur ? "rgba(139,233,253,.14)" : "rgba(0,0,0,.5)";
    roundRect(nx - w/2, ny - 20, w, 40, 10); ctx.fill();
    ctx.strokeStyle = n.col; ctx.lineWidth = isCur ? 3 : 2;
    roundRect(nx - w/2, ny - 20, w, 40, 10); ctx.stroke();
    ctx.fillStyle = n.col;
    ctx.beginPath(); ctx.arc(nx - w/2 + 15, ny, 5, 0, Math.PI*2); ctx.fill();
    ctx.textAlign = "left";
    ctx.fillStyle = isCur ? "#fff" : "#d6dcec";
    ctx.fillText(n.name, nx - w/2 + 27, ny + 5);
    // 부가 태그
    if(n.tag){
      ctx.font = "10px sans-serif"; ctx.fillStyle = "#64748b";
      ctx.textAlign = "center";
      ctx.fillText(n.tag, nx, ny + 34);
    }
    if(isCur){
      ctx.font = "bold 11px sans-serif"; ctx.fillStyle = "#8be9fd";
      ctx.textAlign = "center";
      ctx.fillText("현재 위치", nx, ny - 28);
    }
  }
  // 범례
  ctx.textAlign = "left";
  ctx.font = "11px sans-serif"; ctx.fillStyle = "#64748b";
  ctx.fillText("본관 안의 시설(강의실·도서관·교장실·양호실·매점)과 동아리방은 각 건물 내부에 있습니다.", px2 + 34, py + PH - 22);
  ctx.restore();
}

// 월드 좌표 배경(실내/마을/항구) — translate(-camX,-camY) 이후 호출
function drawWorldBackdrop(){
  const vx0 = camX - 100, vx1 = camX + VIEW_W + 100;

    // 목재/석재 벽 타일
    const ty0 = Math.floor(camY/44)*44, ty1 = camY + VIEW_H + 44;
    const tx0 = Math.floor(camX/88)*88, tx1 = camX + VIEW_W + 88;
    for(let wy = ty0; wy < ty1; wy += 44){
      for(let wx = tx0; wx < tx1; wx += 88){
        ctx.fillStyle = ((Math.floor(wx/88) + Math.floor(wy/44)) % 2) ? "#241c16" : "#2a2019";
        ctx.fillRect(wx, wy, 86, 42);
      }
    }
    // 층 사이 아치 창(달빛)
    for(const fy of [1240, 830, 420]){
      for(let wx = 240; wx < mapW - 180; wx += 400){
        if(wx < vx0 - 120 || wx > vx1 + 120) continue;
        const wyt = fy - 168;
        ctx.fillStyle = "#0d1626";
        ctx.fillRect(wx, wyt, 92, 120);
        ctx.beginPath(); ctx.arc(wx + 46, wyt, 46, Math.PI, 0); ctx.fill();
        ctx.save(); ctx.globalCompositeOperation = "lighter";
        const g = ctx.createLinearGradient(0, wyt - 46, 0, wyt + 120);
        g.addColorStop(0, "rgba(150,180,255,.30)"); g.addColorStop(1, "rgba(150,180,255,0)");
        ctx.fillStyle = g; ctx.fillRect(wx - 6, wyt - 46, 104, 170);
        ctx.restore();
        ctx.strokeStyle = "#3a2c1e"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(wx + 46, wyt, 46, Math.PI, 0); ctx.stroke();
        ctx.strokeRect(wx, wyt, 92, 120);
        ctx.beginPath(); ctx.moveTo(wx + 46, wyt - 46); ctx.lineTo(wx + 46, wyt + 120);
        ctx.moveTo(wx, wyt + 34); ctx.lineTo(wx + 92, wyt + 34); ctx.stroke();
      }
    }
    // 벽 등불(따뜻한 점광)
    for(const fy of [1240, 830, 420]){
      for(let wx = 120; wx < mapW; wx += 300){
        if(wx < vx0 || wx > vx1) continue;
        const ly = fy - 250;
        ctx.save(); ctx.globalCompositeOperation = "lighter";
        const fl = 0.7 + Math.sin(performance.now()/240 + wx) * 0.15;

        lg.addColorStop(0, `rgba(255,210,140,${0.5*fl})`); lg.addColorStop(1, "rgba(255,180,80,0)");
        ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(wx, ly, 120, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        ctx.fillStyle = "#c8922e"; ctx.fillRect(wx - 4, ly - 6, 8, 14);
      }
    }
  }else if(mapTheme === "town"){
    // 뒤쪽 집들
    for(let hx = 120; hx < mapW; hx += 360){
      if(hx < vx0 - 200 || hx > vx1 + 200) continue;
      const hh = 170 + (Math.floor(hx/360) % 3) * 40;
      const bw = 210;
      ctx.fillStyle = "#3a2f4a";
      ctx.fillRect(hx, mapGroundY - hh, bw, hh);
      ctx.fillStyle = "#5a3f47";                       // 지붕
      ctx.beginPath();
      ctx.moveTo(hx - 16, mapGroundY - hh);
      ctx.lineTo(hx + bw/2, mapGroundY - hh - 54);
      ctx.lineTo(hx + bw + 16, mapGroundY - hh);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,210,120,.55)";         // 창문
      for(let r = 0; r < 2; r++) for(let c = 0; c < 3; c++)
        ctx.fillRect(hx + 24 + c*60, mapGroundY - hh + 34 + r*58, 30, 34);
    }
  }else if(mapTheme === "harbor"){
    // 바다 + 파도
    const seaTop = 470;
    const sg = ctx.createLinearGradient(0, seaTop, 0, mapGroundY);
    sg.addColorStop(0, "#2c4a6e"); sg.addColorStop(1, "#1a3450");
    ctx.fillStyle = sg; ctx.fillRect(camX - 20, seaTop, VIEW_W + 40, mapGroundY - seaTop);
    ctx.strokeStyle = "rgba(180,220,255,.25)"; ctx.lineWidth = 2;
    for(let wy = seaTop + 20; wy < mapGroundY; wy += 26){
      ctx.beginPath();
      for(let wx = camX - 20; wx < camX + VIEW_W + 20; wx += 40){

      }
      ctx.stroke();
    }
    // 먼 배 실루엣
    for(const sx of [700, 1500]){
      if(sx < vx0 - 200 || sx > vx1 + 200) continue;
      ctx.fillStyle = "#16283e";
      ctx.beginPath();
      ctx.moveTo(sx - 90, seaTop + 40); ctx.lineTo(sx + 90, seaTop + 40);
      ctx.lineTo(sx + 60, seaTop + 74); ctx.lineTo(sx - 60, seaTop + 74);
      ctx.closePath(); ctx.fill();
      ctx.fillRect(sx - 4, seaTop - 40, 8, 80);
      ctx.fillStyle = "#22384f";
      ctx.beginPath(); ctx.moveTo(sx + 4, seaTop - 36); ctx.lineTo(sx + 54, seaTop + 8); ctx.lineTo(sx + 4, seaTop + 8); ctx.closePath(); ctx.fill();
    }
  }else if(mapTheme === "coast"){
    // 서쪽: 바다 + 파도 + 먼 배
    const seaTop = mapGroundY - 170;
    const seaR = Math.min(vx1 + 20, 2650);

      const sg = ctx.createLinearGradient(0, seaTop, 0, mapGroundY);
      sg.addColorStop(0, "#2c4a6e"); sg.addColorStop(1, "#1a3450");
      ctx.fillStyle = sg; ctx.fillRect(Math.max(vx0 - 20, -20), seaTop, seaR - Math.max(vx0 - 20, -20), mapGroundY - seaTop);
      ctx.strokeStyle = "rgba(180,220,255,.25)"; ctx.lineWidth = 2;
      for(let wy = seaTop + 20; wy < mapGroundY; wy += 26){
        ctx.beginPath();
        for(let wx = Math.max(vx0 - 20, 0); wx < seaR; wx += 40){
          const yy = wy + Math.sin((wx + performance.now()/16)/60) * 3;
          if(wx === Math.max(vx0 - 20, 0)) ctx.moveTo(wx, yy); else ctx.lineTo(wx, yy);
        }
        ctx.stroke();
      }
      for(const sx of [700, 1500]){
        if(sx < vx0 - 200 || sx > vx1 + 200) continue;
        ctx.fillStyle = "#16283e";
        ctx.beginPath();
        ctx.moveTo(sx - 90, seaTop + 40); ctx.lineTo(sx + 90, seaTop + 40);
        ctx.lineTo(sx + 60, seaTop + 74); ctx.lineTo(sx - 60, seaTop + 74);
        ctx.closePath(); ctx.fill();
        ctx.fillRect(sx - 4, seaTop - 40, 8, 80);
        ctx.fillStyle = "#22384f";
        ctx.beginPath(); ctx.moveTo(sx + 4, seaTop - 36); ctx.lineTo(sx + 54, seaTop + 8); ctx.lineTo(sx + 4, seaTop + 8); ctx.closePath(); ctx.fill();
      }
    }
    // 등대 (절벽 위 실루엣)
    if(vx0 < 700){
      ctx.fillStyle = "#3a2f4a";
      ctx.fillRect(380, 560 - 150, 44, 150);
      ctx.fillStyle = "#5a3f47";
      ctx.fillRect(370, 560 - 170, 64, 24);
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const lg = ctx.createRadialGradient(402, 560 - 158, 3, 402, 560 - 158, 70);
      lg.addColorStop(0, "rgba(255,235,160,.9)"); lg.addColorStop(1, "rgba(255,220,120,0)");
      ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(402, 560 - 158, 70, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // 동쪽: 마을 집들
    for(let hx = 3320; hx < mapW - 260; hx += 360){
      if(hx < vx0 - 260 || hx > vx1 + 260) continue;
      const hh = 170 + (Math.floor(hx/360) % 3) * 40;
      const bw = 210;
      ctx.fillStyle = "#3a2f4a";
      ctx.fillRect(hx, mapGroundY - hh, bw, hh);
      ctx.fillStyle = "#5a3f47";
      ctx.beginPath();
      ctx.moveTo(hx - 16, mapGroundY - hh);
      ctx.lineTo(hx + bw/2, mapGroundY - hh - 54);
      ctx.lineTo(hx + bw + 16, mapGroundY - hh);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,210,120,.55)";
      for(let r = 0; r < 2; r++) for(let c = 0; c < 3; c++)
        ctx.fillRect(hx + 24 + c*60, mapGroundY - hh + 34 + r*58, 30, 34);
    }
  }else if(mapTheme === "volcano"){
    // 뒤쪽 화산 실루엣 + 정상 용암 불빛
    for(const v of [{x:1300, h:360, w:520}, {x:2500, h:440, w:620}]){

      ctx.fillStyle = "#3a1712";
      ctx.beginPath();
      ctx.moveTo(v.x - v.w/2, mapGroundY);
      ctx.lineTo(v.x - v.w*0.13, mapGroundY - v.h);
      ctx.lineTo(v.x + v.w*0.13, mapGroundY - v.h);
      ctx.lineTo(v.x + v.w/2, mapGroundY);
      ctx.closePath(); ctx.fill();
      // 분화구 용암 광
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const g = ctx.createRadialGradient(v.x, mapGroundY - v.h, 4, v.x, mapGroundY - v.h, 90);
      g.addColorStop(0, "rgba(255,140,40,.8)"); g.addColorStop(1, "rgba(255,60,20,0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(v.x, mapGroundY - v.h, 90, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // 흘러내리는 용암 줄기
      ctx.strokeStyle = "rgba(255,90,30,.5)"; ctx.lineWidth = 4;

      ctx.lineTo(v.x - v.w*0.16, mapGroundY - v.h*0.4); ctx.lineTo(v.x - v.w*0.05, mapGroundY); ctx.stroke();
    }
    // 지면 용암 균열 빛
    ctx.save(); ctx.globalCompositeOperation = "lighter";
    for(let lx = Math.floor(vx0/220)*220; lx < vx1 + 220; lx += 220){
      const gx = lx + ((lx*53) % 120);

      ctx.fillStyle = "#5a3a24"; ctx.fillRect(bx - 3, mapGroundY - 92, 6, 74);
      ctx.fillStyle = "#c9a15a";
      ctx.beginPath(); ctx.moveTo(bx + 4, mapGroundY - 88); ctx.lineTo(bx + 50, mapGroundY - 30); ctx.lineTo(bx + 4, mapGroundY - 30); ctx.closePath(); ctx.fill();
    }
  }
}

// 인페르노 번 광선 (월드 좌표)
function drawInfernoBeam(){
  const pl = player;
  const heat = Math.min(1, pl.infernoT / SKILL.inferno.rampT);
  const tier = skillTier("inferno");
  const x0 = pl.x + pl.facing * 24, by = pl.y - 30;
  const x1 = pl.infernoHitX ?? (pl.x + pl.facing * SKILL.inferno.range);
  const w = 6 + heat * 16 + getSkillLv("inferno") * 1.2;
  const flick = 0.85 + Math.sin(performance.now()/28) * 0.15;
  const core = tier === 2 ? "#eaf6ff" : "#fff7dd";
  const mid  = tier === 2 ? "#7cc4ff" : heat > 0.66 ? "#ffd23e" : "#ff9d4d";
  const out  = tier === 2 ? "rgba(90,150,255,.4)" : "rgba(255,110,30,.4)";
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.lineCap = "round";
  ctx.strokeStyle = out; ctx.lineWidth = w * 2.6 * flick;
  ctx.beginPath(); ctx.moveTo(x0, by); ctx.lineTo(x1, by); ctx.stroke();
  ctx.strokeStyle = mid; ctx.globalAlpha = 0.9; ctx.lineWidth = w * 1.3 * flick;
  ctx.beginPath(); ctx.moveTo(x0, by); ctx.lineTo(x1, by); ctx.stroke();
  ctx.strokeStyle = core; ctx.globalAlpha = 1; ctx.lineWidth = Math.max(2, w * 0.5);
  ctx.beginPath(); ctx.moveTo(x0, by); ctx.lineTo(x1, by); ctx.stroke();
  // 임팩트 글로우
  const ig = ctx.createRadialGradient(x1, by, 2, x1, by, 30 + heat * 44);
  ig.addColorStop(0, core); ig.addColorStop(0.4, mid); ig.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = ig; ctx.globalAlpha = 0.95;
  ctx.beginPath(); ctx.arc(x1, by, 30 + heat * 44, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // 열기 게이지
  ctx.fillStyle = "rgba(0,0,0,.6)";
  ctx.fillRect(pl.x - 26, pl.y - P.h - 30, 52, 8);
  ctx.fillStyle = heat >= 1 ? (tier === 2 ? "#7cc4ff" : "#ffd93d") : "#ff6a3a";
  ctx.fillRect(pl.x - 26, pl.y - P.h - 30, 52 * heat, 8);
  if(heat >= 1){
    ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
    ctx.fillStyle = tier === 2 ? "#bfe3ff" : "#ffd93d";
    ctx.fillText("MAX HEAT!", pl.x, pl.y - P.h - 36);
  }
}

// 멸화 운석 (월드 좌표) — 낙하 스트릭 + 화염 머리
function drawMeteors(){
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for(const mt of meteors){
    const core = mt.tier === 2 ? "#eaf6ff" : "#fff7dd";
    const mid  = mt.tier === 2 ? "#7cc4ff" : "#ff8030";
    const ang = Math.atan2(mt.vy, mt.vx);
    const tl = 46 + mt.r * 2;
    const tx = mt.x - Math.cos(ang) * tl, ty = mt.y - Math.sin(ang) * tl;
    ctx.strokeStyle = mid; ctx.lineCap = "round"; ctx.globalAlpha = 0.85;
    ctx.lineWidth = mt.r * 1.4;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(mt.x, mt.y); ctx.stroke();
    ctx.strokeStyle = core; ctx.globalAlpha = 1; ctx.lineWidth = mt.r * 0.6;
    ctx.beginPath(); ctx.moveTo(tx + (mt.x-tx)*0.4, ty + (mt.y-ty)*0.4); ctx.lineTo(mt.x, mt.y); ctx.stroke();
    const g = ctx.createRadialGradient(mt.x, mt.y, 1, mt.x, mt.y, mt.r * 2);
    g.addColorStop(0, core); g.addColorStop(0.4, mid); g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(mt.x, mt.y, mt.r * 2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawMysteryDoor(x){
  const y = mapGroundY, W = 96, H = 168;
  const pulse = 0.5 + Math.sin(performance.now()/650) * 0.5;

  ctx.beginPath(); ctx.arc(x, y - H/2, 130, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.beginPath(); ctx.arc(x, y - H, W/2, Math.PI, 0); ctx.fill();

  // 맥동하는 룬 (원 + 눈)
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.globalAlpha = 0.4 + pulse * 0.6;
  ctx.strokeStyle = "#9d5cff"; ctx.lineWidth = 2.5;

  ctx.beginPath(); ctx.arc(x, y - H*0.55, 13, 0, Math.PI*2); ctx.stroke();

  for(let i = -1; i <= 1; i++){

    ctx.moveTo(x + i*8, y - H*0.55 - 8);

  ctx.beginPath(); ctx.ellipse(x, y - H*0.55, 6, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // 가로지른 사슬
  ctx.strokeStyle = "#4a4038"; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(x - W/2 - 6, y - H*0.7); ctx.lineTo(x + W/2 + 6, y - H*0.32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - W/2 - 6, y - H*0.32); ctx.lineTo(x + W/2 + 6, y - H*0.7); ctx.stroke();
  ctx.fillStyle = "#5a5048";
  ctx.beginPath(); ctx.arc(x, y - H*0.51, 7, 0, Math.PI*2); ctx.fill();   // 자물쇠

function drawMageSprite(sheet, frame, x, y, facing, alpha){
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.scale(facing, 1);
  const w = MAGE.w * MAGE.scale, h = MAGE.h * MAGE.scale;
  ctx.drawImage(sheet, frame*MAGE.w, 0, MAGE.w, MAGE.h, -w/2, -h, w, h);
  ctx.restore();
}

function pickMageFrame(){
  const pl = player, F = MAGE.frames;
  if(pl.hurtFlash > 0.12) return F.hurt[0];
  if(pl.infernoOn) return F.cast[0];
  if(pl.fbCharge >= 0) return F.charge[0];
  if(pl.castT > 0) return F.cast[pl.castT > 0.09 ? 0 : 1];
  if(pl.dashTimer > 0) return F.run[1];
  if(!pl.onGround) return pl.vy < 0 ? F.jump[0] : F.fall[0];
  if(Math.abs(pl.vx) > 40) return F.run[Math.floor(pl.animT * 10) % 4];
  return F.idle[Math.floor(pl.animT * 2.5) % 2];
}

function drawPlayer(){
  const pl = player;
  if(pl.dead){
    ctx.save();
    ctx.globalAlpha = clamp(pl.deadTimer / 2, 0, 1);
    ctx.fillStyle = "#94a3b8";
    ctx.fillRect(pl.x - P.w/2, pl.y - 14, P.w + 8, 14);
    ctx.restore();
    return;
  }
  for(const t of pl.trail){
    drawMageSprite(mageSheet, MAGE.frames.run[1], t.x, t.y, t.f, t.t / 0.22 * 0.35);
  }
  if(pl.iframes > 0 && Math.floor(pl.iframes * 12) % 2 === 0 && pl.dashTimer <= 0) return;

  const x = pl.x, y = pl.y;
  const fr = pickMageFrame();
  drawMageSprite(mageSheet, fr, x, y, pl.facing, 1);
  if(pl.hurtFlash > 0)
    drawMageSprite(mageWhite, fr, x, y, pl.facing, Math.min(1, pl.hurtFlash * 2.2));

  const charging = pl.fbCharge >= 0;
  const chargeK = charging ? pl.fbCharge / SKILL.fireball.maxCharge : 0;
  const gx = x + pl.facing * 16, gy = y - 56;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const gr = 4 + chargeK * 10;
  const gg = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr*2.2);
  gg.addColorStop(0, charging ? "#fff0c0" : "rgba(255,210,127,.75)");
  gg.addColorStop(1, "rgba(255,150,60,0)");
  ctx.fillStyle = gg;
  ctx.beginPath(); ctx.arc(gx, gy, gr*2.2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  if(charging){
    const k = clamp(pl.fbCharge / SKILL.fireball.maxCharge, 0, 1);
    ctx.fillStyle = "rgba(0,0,0,.6)";
    ctx.fillRect(x - 26, y - P.h - 30, 52, 8);
    ctx.fillStyle = k >= 1 ? "#ffd93d" : "#ff9d4d";
    ctx.fillRect(x - 26, y - P.h - 30, 52*k, 8);
    if(k >= 1){
      ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
      ctx.fillStyle = "#ffd93d";
      ctx.fillText("MAX!", x, y - P.h - 36);
    }
  }
  ctx.restore();
}

                 spk.includes("발더스")||spk.includes("대마도사")?"#ff8a5c": spk.includes("유령")||spk.includes("유키네")?"#a5b0c8":
                 spk.includes("브란")?"#ff9d5c": spk.includes("사서")?"#a0d8c0":"#8be9fd";
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.35)"; roundRect(bx+18, by+18, 60, 82, 8); ctx.fill();
    ctx.strokeStyle = pcol; ctx.lineWidth = 2; roundRect(bx+18, by+18, 60, 82, 8); ctx.stroke();
    const gg = ctx.createRadialGradient(bx+48, by+55, 4, bx+48, by+55, 30);
    gg.addColorStop(0, pcol); gg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(bx+48,by+55,30,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.fillStyle = pcol; ctx.textAlign="center"; ctx.font="26px serif"; ctx.fillText("✦", bx+48, by+66);
    ctx.restore();
    // 네임플레이트 탭
    ctx.textAlign="left";
    if(spk){
      ctx.font="bold 13px sans-serif"; const nw=ctx.measureText(spk).width+24;
      ctx.fillStyle="rgba(20,16,34,.96)"; roundRect(bx+92, by-14, nw, 26, 7); ctx.fill();
      ctx.strokeStyle=pcol; ctx.lineWidth=1.5; roundRect(bx+92, by-14, nw, 26, 7); ctx.stroke();
      ctx.fillStyle=pcol; ctx.fillText(spk, bx+104, by+4);
    }
    // 본문 (타이프라이터)
    const full = dialog.lines[dialog.i] || "";
    const nchar = Math.min(full.length, Math.floor((performance.now()-dialog.t0)/20));
    ctx.font="15px 'Trebuchet MS',sans-serif"; ctx.fillStyle="#e6e9f2";
    ctx.fillText(full.slice(0, nchar), bx+100, by+42);
    // 진행 표시 / 계속 캐럿
    ctx.textAlign="right";
    if(nchar >= full.length){
      const blink = (Math.sin(performance.now()/200)>0)?1:0.3;
      ctx.globalAlpha=blink; ctx.fillStyle=pcol; ctx.font="bold 14px sans-serif";
      ctx.fillText("▸ E", bx+bw-24, by+bh-16); ctx.globalAlpha=1;
    }
    ctx.fillStyle="rgba(160,170,190,.5)"; ctx.font="11px sans-serif";
    ctx.fillText(`${dialog.i+1} / ${dialog.lines.length}`, bx+bw-24, by+20);
    ctx.textAlign="left";
  }

  // 사망 오버레이
  if(pl.dead){
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.textAlign = "center";
    ctx.font = "bold 42px sans-serif"; ctx.fillStyle = "#f87171";
    ctx.fillText("쓰러졌습니다...", VIEW_W/2, VIEW_H/2 - 10);
    ctx.font = "17px sans-serif"; ctx.fillStyle = "#cbd5e1";
    ctx.fillText("의무실에서 다시 깨어납니다", VIEW_W/2, VIEW_H/2 + 28);
  }

  ctx.textAlign = "right";
  if(saveFlash > 0){
    ctx.globalAlpha = Math.min(1, saveFlash);
    ctx.font = "12px sans-serif"; ctx.fillStyle = "#4ade80";
    ctx.fillText("✓ 자동 저장됨", VIEW_W - 14, VIEW_H - 14);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// 스킬 아이콘 색 (핫바와 통일)
const SKILL_ICON_COL = { bolt:"#ffb35c", fireball:"#ff6b3a", field:"#ff8c3a", lance:"#ffd23e", nova:"#ff5040", inferno:"#ff7b3a", meltdown:"#ff5030" };

// 스킬별 상세 스탯 텍스트 (현재 레벨 기준)
function skillStatText(k){
  const lv = getSkillLv(k), d = skillDmgText(k);
  if(k === "bolt")     return `데미지 ${d} · MP 0 · 쿨 0.22s · 사거리 ${520 + 30*(lv-1)}`;
  if(k === "fireball") return `데미지 ${d} (풀차지) · MP 15 · 폭발반경 ~${Math.round(110 * (1 + 0.13*(lv-1)))}`;
  if(k === "field")    return `틱당 ${d} · MP 20 · 지속 ${(4 + 0.4*(lv-1)).toFixed(1)}s · 폭 ${150 + 26*(lv-1)}`;
  if(k === "lance")    return `데미지 ${d} · 관통 · MP 12 · 사거리 ${720 + 50*(lv-1)}`;
  if(k === "nova")     return `데미지 ${d} · MP 30 · 반경 ${150 + 20*(lv-1)} · 시전 무적 0.4s`;
  if(k === "meltdown") return `운석당 ${d} · MP 65 · 쿨 24s · 지속 ${(2.6 + 0.25*(lv-1)).toFixed(1)}s · 화면 전체 광역 (고급 제2식)`;
  return `틱당 ${d} ×최대 ${(1 + 2.6).toFixed(1)}배 · MP 10+13/s · 사거리 760 · 단일 광선 (고급)`;
}

function drawLvPips(x, y, lv, col){
  for(let i = 0; i < MAX_SKILL_LV; i++){
    ctx.fillStyle = i < lv ? col : "rgba(100,116,139,.35)";
    const cx = x + i * 15;
    ctx.beginPath();
    ctx.moveTo(cx, y - 6); ctx.lineTo(cx + 6, y); ctx.lineTo(cx, y + 6); ctx.lineTo(cx - 6, y);
    ctx.closePath(); ctx.fill();
  }
}

const LEARN_GEO = { PW: 720, PH: 500 };
function learnPanel(){
  const { PW, PH } = LEARN_GEO;
  return { PW, PH, px: (VIEW_W - PW)/2, py: (VIEW_H - PH)/2 };
}
function learnRowRect(i){
  const { PW, px, py } = learnPanel();
  return { x: px + 24, y: py + 92 + i * 84, w: PW - 48, h: 74 };
}
function learnClick(mx, my){
  if(!learnUI) return;
  for(let i = 0; i < learnUI.opts.length; i++){
    const r = learnRowRect(i);
    if(mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h){
      if(learnUI.sel === i) learnConfirm();
      else learnUI.sel = i;
      return;
    }
  }
}

    ctx.fillText(c.desc, px2 + 86, ry + 36);
    ctx.textAlign = "right";
    ctx.font = "bold 13px sans-serif"; ctx.fillStyle = owned ? "#4ade80" : (player.crystals >= c.cost ? "#a5f3fc" : "#f87171");
    ctx.fillText(owned ? (eq ? "Shift+숫자: 해제" : "숫자: 장착") : ("💎 " + c.cost), px2 + PW - 40, ry + 24);
    ctx.textAlign = "left";
  });
  ctx.restore();
}
function renderTrainer(){

function drawSkillSlot(x, y, key, name, cdRatio, usable, locked){
  const S = 56, cx = x + S/2, cy = y + S/2;
  ctx.save();
  // 프레임 (그라데이션 + 이중 테두리)
  const bg = ctx.createLinearGradient(0, y, 0, y+S);
  bg.addColorStop(0, "rgba(30,34,52,.92)"); bg.addColorStop(1, "rgba(12,14,26,.94)");
  ctx.fillStyle = bg; roundRect(x, y, S, S, 9); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,.6)"; ctx.lineWidth = 3; roundRect(x, y, S, S, 9); ctx.stroke();
  ctx.strokeStyle = locked ? "#39424f" : usable ? "#7b88a6" : "#8a3a3a";
  ctx.lineWidth = 1.5; roundRect(x+1.5, y+1.5, S-3, S-3, 8); ctx.stroke();
  if(locked){
    // 자물쇠
    ctx.strokeStyle = "#6a7488"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy - 8, 6, Math.PI, 0); ctx.stroke();
    ctx.fillStyle = "#6a7488"; roundRect(cx - 9, cy - 8, 18, 14, 3); ctx.fill();
  }else{
    const iconCol = name==="불티" ? "#ffb35c" : name==="화염구" ? "#ff6b3a" :
                    name==="화염장판" ? "#ff8c3a" : name==="랜스" ? "#ffd23e" :
                    name==="노바" ? "#ff5040" : name==="인페르노" ? "#ff4d00" : name==="멸화" ? "#c04dff" : "#8ab6ff";
    // 아이콘 오브 (글로우 + 구체)
    ctx.save(); ctx.globalCompositeOperation = "lighter";
    const gg = ctx.createRadialGradient(cx, cy-2, 1, cx, cy-2, 18);
    gg.addColorStop(0, usable ? iconCol : "rgba(80,80,90,.5)"); gg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(cx, cy-2, 18, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    const og = ctx.createRadialGradient(cx-4, cy-8, 1, cx, cy-2, 14);
    og.addColorStop(0, usable ? shade(iconCol, 0.4) : "#5a5a62");
    og.addColorStop(1, usable ? shade(iconCol, -0.3) : "#3a3a42");
    ctx.fillStyle = og; ctx.beginPath(); ctx.arc(cx, cy-2, 13, 0, Math.PI*2); ctx.fill();
    // 쿨다운 스윕
    const k = clamp(cdRatio, 0, 1);
    if(k > 0){
      ctx.fillStyle = "rgba(6,8,16,.68)";
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, S*0.72, -Math.PI/2, -Math.PI/2 + Math.PI*2*k); ctx.closePath();
      ctx.save(); roundRect(x, y, S, S, 9); ctx.clip(); ctx.fill(); ctx.restore();
    }
  }
  // 키캡
  ctx.fillStyle = "rgba(0,0,0,.5)"; roundRect(x+3, y+2, key.length>2?30:16, 14, 4); ctx.fill();
  ctx.textAlign = "center"; ctx.font = "bold 10px 'Trebuchet MS',sans-serif";
  ctx.fillStyle = locked ? "#5f6a86" : "#ffd98a";
  ctx.fillText(key, x + 3 + (key.length>2?15:8), y + 12);
  // 이름
  ctx.font = "9px sans-serif"; ctx.fillStyle = locked ? "#5f6a86" : "#c8d0e0";
  ctx.fillText(name, cx, y + S - 5);
  ctx.restore();
}

function bar(x, y, w, h, ratio, fg, bg){
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fg;
  ctx.fillRect(x, y, w * clamp(ratio, 0, 1), h);
  ctx.strokeStyle = "rgba(0,0,0,.5)"; ctx.lineWidth = 1;
  ctx.strokeRect(x + .5, y + .5, w - 1, h - 1);
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ============================== UI 키트 (통일 룩) ==============================
const UI = { ink:"#e8ecf6", dim:"#9aa4bd", faint:"#5f6a86", gold:"#f2c46b", line:"#3a4256" };
// 색 밝기 조절 (amt: -1~1)
function shade(hex, amt){
  const n = parseInt(hex.slice(1), 16);
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  if(amt >= 0){ r += (255-r)*amt; g += (255-g)*amt; b += (255-b)*amt; }
  else { r *= (1+amt); g *= (1+amt); b *= (1+amt); }
  return `rgb(${r|0},${g|0},${b|0})`;
}
// 헤더용 자간 텍스트
function headerText(txt, x, y, size, col, spacing, align){
  ctx.save();
  ctx.textAlign = align || "left";
  ctx.font = `600 ${size}px "Trebuchet MS","Segoe UI",sans-serif`;
  if("letterSpacing" in ctx) ctx.letterSpacing = (spacing ?? 1) + "px";
  ctx.fillStyle = col || UI.ink;
  ctx.fillText(txt, x, y);
  if("letterSpacing" in ctx) ctx.letterSpacing = "0px";
  ctx.restore();
}
// 공통 패널: 유리질 배경 + 이중 테두리 + 상단 하이라이트 + 코너 장식
function uiPanel(x, y, w, h, opts){
  opts = opts || {};
  const accent = opts.accent || "#7c6cc0";
  const r = opts.r ?? 14;
  ctx.save();
  // 그림자
  ctx.fillStyle = "rgba(0,0,0,.35)";
  roundRect(x+3, y+5, w, h, r); ctx.fill();
  // 본체 그라데이션
  const g = ctx.createLinearGradient(0, y, 0, y+h);
  g.addColorStop(0, "rgba(24,27,44,.97)");
  g.addColorStop(1, "rgba(14,16,28,.98)");
  ctx.fillStyle = g; roundRect(x, y, w, h, r); ctx.fill();
  // 상단 광택
  const gl = ctx.createLinearGradient(0, y, 0, y+h*0.4);
  gl.addColorStop(0, "rgba(255,255,255,.06)"); gl.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = gl; roundRect(x, y, w, h*0.5, r); ctx.fill();
  // 외곽 테두리(악센트)
  ctx.strokeStyle = accent; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.85;
  roundRect(x+1, y+1, w-2, h-2, r-1); ctx.stroke();
  ctx.globalAlpha = 1;
  // 내곽 얇은 선
  ctx.strokeStyle = "rgba(255,255,255,.05)"; ctx.lineWidth = 1;
  roundRect(x+4, y+4, w-8, h-8, r-3); ctx.stroke();
  // 코너 장식(작은 마름모)
  if(opts.corners !== false){
    ctx.fillStyle = accent;
    for(const [cx,cy] of [[x+10,y+10],[x+w-10,y+10],[x+10,y+h-10],[x+w-10,y+h-10]]){
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(Math.PI/4); ctx.globalAlpha=0.7;
      ctx.fillRect(-2.5,-2.5,5,5); ctx.restore();
    }
  }
  ctx.restore();
}
// 광택 게이지 바
function uiBar(x, y, w, h, ratio, c1, c2, opts){
  opts = opts || {};
  ctx.save();
  // 트랙
  ctx.fillStyle = "rgba(0,0,0,.55)";
  roundRect(x-1, y-1, w+2, h+2, h/2+1); ctx.fill();
  // 채움
  const rr = clamp(ratio, 0, 1);
  if(rr > 0.001){
    roundRect(x, y, Math.max(h, w*rr), h, h/2); ctx.save(); ctx.clip();
    const g = ctx.createLinearGradient(0, y, 0, y+h);
    g.addColorStop(0, c1); g.addColorStop(1, c2 || c1);
    ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
    // 상단 하이라이트
    ctx.fillStyle = "rgba(255,255,255,.28)"; ctx.fillRect(x, y+1, w, h*0.34);
    ctx.restore();
  }
  // 세그먼트 눈금
  if(opts.seg){ ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 1;
    for(let i=1;i<opts.seg;i++){ const sx=x+w*i/opts.seg; ctx.beginPath(); ctx.moveTo(sx,y); ctx.lineTo(sx,y+h); ctx.stroke(); }
  }
  // 테두리
  ctx.strokeStyle = "rgba(255,255,255,.12)"; ctx.lineWidth = 1;
  roundRect(x, y, w, h, h/2); ctx.stroke();
  ctx.restore();
}

function themeArt(){ return THEME_ART[mapTheme] || THEME_ART.forest; }
function clipText(t, n){ return t.length > n ? t.slice(0, n-1) + "…" : t; }

// ============================== BOOT & MAIN LOOP ==============================
loadMap("campus", 200);   // 신규 시작: 아르카나 언덕 서쪽 기슭 (튜토리얼)
loadGame();               // 저장 데이터가 있으면 해당 진행으로 이어하기

let last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  let dt = (now - last) / 1000;
  last = now;
  if(dt > 0.25) dt = 0.25;

  if(juice.hitstop > 0){
    juice.hitstop -= dt;
    render();
    return;
  }

  acc += dt;
  while(acc >= DT){
    update(DT);
    acc -= DT;
  }
  render();
}
requestAnimationFrame(frame);
