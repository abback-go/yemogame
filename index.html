const particles = [];
function spawnParticles(x, y, opt){
  const n = opt.n ?? 8;
  for(let i=0;i<n;i++){
    const ang = opt.ang !== undefined ? opt.ang + rand(-opt.spread, opt.spread) : rand(0, Math.PI*2);
    const sp = rand(opt.sp0 ?? 60, opt.sp1 ?? 260);
    particles.push({
      x, y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
      life: rand(opt.l0 ?? 0.25, opt.l1 ?? 0.6), t: 0,
      r: rand(opt.r0 ?? 2, opt.r1 ?? 5),
      col: Array.isArray(opt.col) ? opt.col[irand(0,opt.col.length-1)] : opt.col,
      grav: opt.grav ?? 0, add: opt.add ?? false, drag: opt.drag ?? 0.98,
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.t += dt;
    if(p.t >= p.life){ particles.splice(i,1); continue; }
    p.vx *= p.drag; p.vy = p.vy*p.drag + p.grav*dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
  }
}

let transition = null;   // { t, phase:"out"|"in", to, tx, ty }
function startTransition(to, tx, ty){
  if(transition) return;

function loadMap(id, spawnX, spawnY){
  const M = MAPS[id];
  curMapId = id;
  mapW = M.w; mapH = M.h || VIEW_H; mapTheme = M.theme; mapTall = !!M.tall;
  // 평면 맵은 바닥 자동 추가, 다층(tall) 맵은 자체 층(solidGround) 사용
  platforms = M.tall ? [...M.platforms] : [{ x: 0, y: GROUND_Y, w: M.w, h: 80, solidGround: true, base: true }, ...M.platforms];
  stairs = M.stairs || [];
  signs = M.signs || []; portals = M.portals || [];
  npcs = (M.npcs || []).map(n => ({ ...n, y: n.y ?? GROUND_Y }));
  mapTorches = M.torches || [];
  mapDoor = M.door || null;
  // 몬스터 리스폰 (일회성 보스 제외)
  monsters.length = 0;
  BOSS_M = null;
  for(const md of (M.mobs || [])) spawnMob(md[0], md[1], md[2], md[3], md[4]);
  if(id === "forest"){
    spawnMob("boss", 4100, 4100, 4100);
    BOSS_M = monsters[monsters.length - 1];
    if(boss.defeated){ BOSS_M.dead = true; BOSS_M.respawn = Infinity; }
    boss.active = false; boss.state = "wait"; boss.t = 1.2;
  }
  spikes.length = 0; eprojs.length = 0;
  projectiles.length = 0; fields.length = 0;
  meteors.length = 0; melt = null; meltFlash = 0;
  if(player) player.infernoOn = false;
  particles.length = 0; dmgNumbers.length = 0; floatTexts.length = 0;
  player.x = clamp(spawnX, P.w/2, mapW - P.w/2);
  player.y = spawnY ?? GROUND_Y; player.vx = 0; player.vy = 0;
  camX = clamp(player.x - VIEW_W/2, 0, Math.max(0, mapW - VIEW_W));
  camY = clamp(player.y - VIEW_H*0.62, 0, Math.max(0, mapH - VIEW_H));
  addFloatText(player.x, player.y - 130, M.name, "#8be9fd");
}

// ============================== 스탯 랭크 ==============================
function rankIdx(k){ return player.stats[k].r; }
function maxHp(){ return P.maxHp + (rankIdx("vit")-1)*10; }
function maxMp(){ return P.maxMp + (rankIdx("mag")-1)*6; }
function magMul(){ return 1 + (rankIdx("mag")-1)*0.06; }
function strMul(){ return 1 + (rankIdx("str")-1)*0.05; }
function critChance(){ return 0.12 + (rankIdx("agi")-1)*0.008; }
function agiSpeedMul(){ return 1 + (rankIdx("agi")-1)*0.02; }
function dashCdMul(){ return Math.max(0.5, 1 - (rankIdx("agi")-1)*0.03); }
function wilRegenMul(){ return 1 + (rankIdx("wil")-1)*0.06; }
function vitDmgMul(){ return Math.max(0.5, 1 - (rankIdx("vit")-1)*0.02); }
function chargeSpeedMul(){ return 1 + (rankIdx("mag")-1)*0.04; }
function rankColor(rank){
  const c = rank[0];
  if(rank === "SSS") return "#f472b6";
  if(rank === "SS")  return "#fb923c";
  if(rank === "S")   return "#fbbf24";
  return c==="D" ? "#9ca3af" : c==="C" ? "#4ade80" : c==="B" ? "#60a5fa" : "#c084fc";
}
function overallRank(){
  const ks = Object.keys(STAT_DEFS);
  const avg = Math.round(ks.reduce((s,k)=>s+player.stats[k].r,0)/ks.length);
  return RANKS[clamp(avg, 0, RANKS.length-1)];
}

const rankBanners = [];
function trainStat(key, amount, fromAction){
  const st = player.stats[key];
  if(fromAction){
    if(st.act >= ACTION_TRAIN_CAP) return;
    st.act += amount;
  }
  if(st.r >= RANKS.length-1) return;
  st.tp += amount;
  while(st.tp >= RANK_NEED[st.r] && st.r < RANKS.length-1){
    st.tp -= RANK_NEED[st.r];
    st.r++;
    const rank = RANKS[st.r];
    rankBanners.push({ text: `${STAT_DEFS[key].name}  ${RANKS[st.r-1]} → ${rank}`, col: rankColor(rank), t: 0, life: 2.2 });
    juice.addHitstop(0.12); juice.addShake(0.3); juice.flash = Math.max(juice.flash, 0.3);
    spawnParticles(player.x, player.y - P.h/2, { n: 34, col: [rankColor(rank), "#fff"], sp0: 100, sp1: 380, l0: .4, l1: .9, add: true, grav: -80 });
  }
}

const questState = { idx: 0, prog: 0, doneAll: false, banner: null };
function curQuest(){ return questState.doneAll ? null : QUESTS[questState.idx]; }
function questEvent(type, target){
  const q = curQuest();
  if(!q || q.type !== type) return;
  if(q.target && q.target !== target) return;
  questState.prog++;
  if(questState.prog >= q.need) completeQuest();
}
function completeQuest(){
  const q = QUESTS[questState.idx];
  const rewardText = q.rewards.map(([k,s])=>`${STAT_DEFS[k].name} 수련치 [${s}]`).join("   ");
  questBanner(`퀘스트 완료!  — ${q.name}`, `보상: ${rewardText}   EXP +${q.exp}`, "Tab: 학생 수첩에서 확인");
  for(const [k,s] of q.rewards) trainStat(k, TRAIN_SIZE[s], false);
  gainExp(q.exp);
  juice.flash = Math.max(juice.flash, 0.2);
  questState.idx++;
  questState.prog = 0;
  if(questState.idx >= QUESTS.length) questState.doneAll = true;
  saveGame();
}
function questBanner(title, sub, sub2){

// 수업(스킬) 하나의 상태: 이수 완료 / 진행 중 / 배우기 가능 / 잠김
function lessonPrereqMet(t, li){
  const ls = t.lessons[li];
  if(ls.req && !ls.req()) return false;
  if(li > 0 && !player.skills[t.lessons[li-1].skill]) return false;   // 같은 교수의 이전 술식 선행
  return true;
}
function lessonStatus(t, li){
  const ls = t.lessons[li], st = teacherState[t.id];
  if(player.skills[ls.skill]) return "done";
  if(st.learning === ls.skill) return "active";
  return lessonPrereqMet(t, li) ? "avail" : "locked";
}
function activeLessons(){
  const out = [];
  for(const t of TEACHERS){
    const st = teacherState[t.id];
    if(!st.learning) continue;
    const ls = t.lessons.find(l => l.skill === st.learning);
    if(ls && !player.skills[ls.skill]) out.push(Object.assign({ teacher: t, st }, ls));
  }
  return out;
}
function activeLesson(){ return activeLessons()[0] || null; }
function skillUsable(k){
  if(player.skills[k]) return true;
  return activeLessons().some(al => al.skill === k);   // 수업 중 임시 각인
}

// ============================== 스킬 강화 (레벨 1~5) ==============================
function getSkillLv(k){ return clamp(player.skillLv[k] || 1, 1, MAX_SKILL_LV); }
function skillLvMul(k){ return 1 + 0.25 * (getSkillLv(k) - 1); }          // 레벨당 데미지 +25%
function skillTier(k){ const l = getSkillLv(k); return l >= 5 ? 2 : l >= 3 ? 1 : 0; }  // 이펙트 티어
function skillDmgText(k, lv){
  const l = lv ?? getSkillLv(k);
  const mul = (1 + 0.25 * (l - 1)) * magMul();
  const S = SKILL[k];
  if(k === "fireball") return `${Math.floor(S.dmg[0]*mul)}~${Math.floor(S.dmg[1]*S.dmgMaxMul*mul)}`;
  return `${Math.floor(S.dmg[0]*mul)}~${Math.floor(S.dmg[1]*mul)}`;
}
function upgradeSkill(k){
  if(!player.skills[k]){
    addFloatText(player.x, player.y - P.h - 40, "아직 배우지 않은 마법이다 — 수업부터!", "#f87171");
    return;
  }
  if(getSkillLv(k) >= MAX_SKILL_LV){
    addFloatText(player.x, player.y - P.h - 40, SKILL[k].name + "은(는) 이미 최대 레벨!", "#fbbf24");
    return;
  }
  player.skillLv[k] = getSkillLv(k) + 1;
  const lv = player.skillLv[k];
  juice.addHitstop(0.1); juice.addShake(0.25); juice.flash = Math.max(juice.flash, 0.25);
  const cols = lv >= 5 ? ["#7cc4ff","#bfe3ff","#fff"] : ["#ff9d4d","#ffd27f","#fff"];
  spawnParticles(player.x, player.y - P.h/2, { n: 36, col: cols, sp0: 100, sp1: 400, l0: .4, l1: .9, add: true, grav: -80 });
  questBanner(`스킬 강화!  — ${SKILL[k].name} Lv.${lv}${lv >= MAX_SKILL_LV ? " (MAX)" : ""}`,
              `데미지 ${skillDmgText(k)} · 범위/이펙트 강화${lv >= 5 ? " · 푸른 화염 각성!" : ""}`,
              "Tab → ←/→ : 스킬 도감에서 상세 확인");
  saveGame();
}
function lessonEvent(task){
  // 동시에 여러 수업이 진행 중이어도 과제 종류가 맞는 수업에 카운트
  for(const al of activeLessons()){
    if(al.task !== task) continue;
    al.st.prog++;
    if(al.st.prog >= al.need) completeLesson(al);
    return;
  }
}
function completeLesson(al){
  player.skills[al.skill] = true;
  al.st.learning = null; al.st.prog = 0;
  for(const [k,s] of al.rewards) trainStat(k, TRAIN_SIZE[s], false);
  gainExp(al.exp);
  questEvent("lesson", al.skill);
  questBanner(`수업 이수!  — ${al.name}`,
              `신규 마법 정식 습득: ${SKILL[al.skill].name} (${SKILL[al.skill].key})`,
              al.teacher.title + " 과정 — " + al.teacher.name);
  saveGame();
}

let dialog = null;   // { lines, i, speaker, onEnd }
function startDialog(lines, onEnd, speaker){
  dialog = { lines, i: 0, onEnd: onEnd || null, speaker: speaker || "" };
}
function advanceDialog(){
  if(!dialog) return;
  dialog.i++;
  if(dialog.i >= dialog.lines.length){
    const cb = dialog.onEnd; dialog = null;
    if(cb) cb();
  }
}

// ============================== 수업 선택 창 (학생 수첩식) ==============================
let learnUI = null;   // { t, opts:[{li, skill, status}], sel }
function openLearn(t){
  const opts = t.lessons.map((ls, li)=> ({ li, skill: ls.skill, status: lessonStatus(t, li) }));
  // 첫 커서: 배우기 가능 → 진행 중 → 그 외
  let sel = opts.findIndex(o => o.status === "avail");
  if(sel < 0) sel = opts.findIndex(o => o.status === "active");
  if(sel < 0) sel = 0;
  learnUI = { t, opts, sel };
}
function learnMove(d){
  if(!learnUI) return;
  const n = learnUI.opts.length;
  learnUI.sel = (learnUI.sel + d + n) % n;
}
function learnConfirm(){
  if(!learnUI) return;
  const t = learnUI.t, o = learnUI.opts[learnUI.sel];
  const ls = t.lessons[o.li], st = teacherState[t.id];
  const status = lessonStatus(t, o.li);
  const sp = t.name + " — " + t.title;
  if(status === "done"){
    addFloatText(player.x, player.y - P.h - 40, "이미 이수한 술식이다", "#94a3b8"); return;
  }
  if(status === "locked"){
    startDialog([ls.reqText || "아직 이 술식을 배울 수 없다."], null, sp);
    learnUI = null; return;
  }
  if(status === "active"){
    startDialog([`과제 진행 중일세: ${ls.desc}  (${st.prog}/${ls.need})`], null, sp);
    learnUI = null; return;
  }
  // avail → 다른 진행 중 수업이 있으면 교체(한 교수당 하나만 진행)
  learnUI = null;
  startDialog(ls.lines, ()=>{
    st.learning = ls.skill; st.prog = 0;
    addFloatText(player.x, player.y - P.h - 60, "수업 시작: " + ls.name, "#8be9fd");
    addFloatText(player.x, player.y - P.h - 34, `임시 각인: ${SKILL[ls.skill].name} (${SKILL[ls.skill].key})`, "#ffb35c");
    saveGame();
  }, sp);
}
function masterChainDone(){ return questState.idx >= QI_EXAM || questState.doneAll; }
function talkToTeacher(t){
  if(t.unlock && !t.unlock()){ startDialog([t.lockText], null, "??? — " + t.title); return; }
  const sp = t.name + " — " + t.title;
  // 대마도사: 『홍염의 서』 퀘스트 체인을 마쳐야 제1식 수업 개방
  if(t.id === "master" && !masterChainDone()){
    if(questState.idx < QI_TALK){
      startDialog(["…나는 발더스. 고급 화염술을 다루지.",
        "허나 지금은 때가 아니다. 남은 학사 일정(퀘스트)부터 마치고 오게."], null, sp);
    }else if(questState.idx === QI_TALK){
      startDialog([
        "…나는 발더스. 이 학교의 고급 화염술을 맡고 있다.",
        "고급 마법을 원한다면, 먼저 『홍염의 서』가 필요하다.",
        "본래 도서관 금서 구역에 봉인돼 있었지… 가서 흔적을 조사해 보게.",
      ], ()=>{ questEvent("talk", "master"); }, sp);
    }else if(questState.idx === QI_BANNED){
      startDialog(["도서관 금서 구역을 조사하게. 사서에겐 비밀로 하고."], null, sp);
    }else if(questState.idx === QI_BATS){
      startDialog(["지하의 어둠이 책을 지키고 있다. 그림자들을 걷어내게."], null, sp);
    }else{
      startDialog(["책이 보이거든 조심히 가져오게…", "그 '문' 근처에서는, 절대 오래 머물지 말게."], null, sp);
    }
    return;
  }
  // 대마도사: 제1식 이수 후 → 제2식 「멸화」 퀘스트 개시 (불의 마을로 안내)
  if(t.id === "master" && player.skills.inferno && questState.idx === QI_M2_TALK){
    startDialog([
      "「인페르노 번」이 완전히 자네 것이 되었군. …허나 그건 시작에 불과하다.",
      "제2식 「멸화」 — 하늘을 통째로 불사르는 술식이다. 헌데 이 학교엔 그 불씨가 없다.",
      "바다 건너 '불의 마을'. 그 화산 기슭에 잠든 화염 군주의 심장… 『멸화의 불씨』가 필요하다.",
      "소금바람 항구로 가게. 배편을 열어 두었네. 살아 돌아온다면, 나머지를 가르쳐 주지.",
    ], ()=>{ questEvent("talk", "master2"); }, sp);
    return;
  }
  // 배울 것이 없으면(모두 이수) 마무리 대사
  const learnable = t.lessons.some((_, li)=>{ const s = lessonStatus(t, li); return s === "avail" || s === "active"; });
  const allDone = t.lessons.every((_, li)=> lessonStatus(t, li) === "done");
  if(allDone){
    if(t.id === "master"){
      startDialog([
        "제1식과 제2식… 이 학교가 전할 수 있는 화염술은 여기까지다.",
        "그 다음은 스스로 개척하는 길뿐. 훌륭한 대마도사가 되었군.",
      ], null, sp);
      return;
    }
    startDialog(["내 가르침은 모두 전수했다. 훌륭한 화염술사가 되었군!", "다음 과정의 교수를 찾아가 보게."], null, sp);
    return;
  }
  if(!learnable){   // 아직 선행 조건 미충족 (예: 불씨 미회수)
    const li = t.lessons.findIndex((_, i)=> lessonStatus(t, i) === "locked");
    const rt = li >= 0 && t.lessons[li].reqText ? t.lessons[li].reqText : "아직 배울 수 있는 술식이 없네.";
    startDialog([rt], null, sp);
    return;
  }
  // ★ 수업 선택 창 열기 (학생 수첩식 UI)
  openLearn(t);
}
function nextLessonInfo(){
  const al = activeLesson();
  if(al) return { type: "active", al };
  for(const t of TEACHERS){
    if(t.unlock && !t.unlock()) continue;
    if(t.id === "master" && !masterChainDone()) continue;   // 퀘스트 체인 선행
    if(t.lessons.some((_, li)=> lessonStatus(t, li) === "avail")) return { type: "avail", t };
  }
  return null;
}

// --- 화염 장판
const fields = [];
function castField(){
  const pl = player;
  const lv = getSkillLv("field"), tier = skillTier("field");
  pl.fieldCd = SKILL.field.cd;
  pl.mp -= SKILL.field.mp;
  pl.castT = 0.2;
  const fy = pl.onGround ? pl.y : GROUND_Y;
  fields.push({ x: pl.x + pl.facing * 90, y: fy, t: 0, tickT: 0,
    w: SKILL.field.width + 26 * (lv - 1),           // 레벨당 폭 확장
    dur: SKILL.field.dur + 0.4 * (lv - 1), tier });
  juice.addShake(0.1);
  const cols = tier === 2 ? ["#7cc4ff","#bfe3ff"] : ["#ff7b3a","#ffd27f"];
  spawnParticles(pl.x + pl.facing*90, fy - 6, { n: 12 + lv*2, col: cols, sp0: 40, sp1: 160, l0: .2, l1: .5, add: true, grav: -120 });
}
function updateFields(dt){
  for(let i=fields.length-1;i>=0;i--){
    const f = fields[i];
    const fdur = f.dur ?? SKILL.field.dur;
    f.t += dt; f.tickT += dt;
    if(Math.random() < 0.3 + (f.tier||0)*0.15)
      spawnParticles(f.x + rand(-f.w/2, f.w/2), f.y - rand(0, 12),
        { n: 1, col: f.tier === 2 ? ["#7cc4ff","#bfe3ff","#eaf6ff"] : ["#ff7b3a","#ffb35c","#ffe08a"],
          sp0: 10, sp1: 60, l0: .2, l1: .5, add: true, grav: -160, r0: 2, r1: 4 });
    if(f.tickT >= SKILL.field.tick){
      f.tickT -= SKILL.field.tick;
      for(const m of monsters){
        if(m.dead) continue;
        const d = MOB_DEFS[m.type];
        if(Math.abs(m.y - f.y) > 60) continue;
        if(m.x + d.w/2 < f.x - f.w/2 || m.x - d.w/2 > f.x + f.w/2) continue;
        hitMonster(m, Math.floor(irand(SKILL.field.dmg[0], SKILL.field.dmg[1]) * magMul() * skillLvMul("field")),
                   20 * sign(m.x - f.x || 1), { type: "field", hitstop: 0.004, shake: 0.015 });
      }
    }
    if(f.t >= fdur) fields.splice(i,1);
  }
}

// --- 멸화 (고급 제2식: 화면 전체 별똥별 대재앙)
let melt = null;        // { t, dur, spawnT, lv, tier }
const meteors = [];     // { x, y, vx, vy, ty, tier, r }
let meltFlash = 0;      // 하늘 붉게 물드는 오버레이(0~1)
function castMeltdown(){
  const pl = player;
  const lv = getSkillLv("meltdown"), tier = skillTier("meltdown");
  pl.mp -= SKILL.meltdown.mp;
  pl.meltCd = SKILL.meltdown.cd;
  pl.castT = 0.4;
  pl.iframes = Math.max(pl.iframes, 0.5);
  melt = { t: 0, dur: SKILL.meltdown.dur + 0.25 * (lv - 1), spawnT: 0, tickT: 0, lv, tier };
  meltFlash = 1;
  juice.addShake(1.0); juice.addHitstop(0.14); juice.flash = Math.max(juice.flash, 0.5);
  questBanner("멸화 발동!", "하늘이 갈라지고 별똥별이 쏟아진다 — 화면 전체가 불바다!", "");
}
function spawnMeteor(){
  const lv = melt.lv, tier = melt.tier;
  // 화면 상단 바깥에서 대각선으로 낙하 → 시야 하단(지면 근처)에 충돌
  const x = camX + rand(-120, VIEW_W + 40);
  const ty = camY + rand(VIEW_H * 0.52, VIEW_H - 60);
  const y = camY - rand(40, 180);
  const speed = rand(1500, 2000);
  meteors.push({ x, y, vx: rand(140, 240), vy: speed, ty, tier, r: 7 + rand(0, 5) + lv });
}
function meteorImpact(mt){
  const tier = mt.tier;
  const R = SKILL.meltdown.radius * 0.7;
  explosions.push({ x: mt.x, y: mt.ty, r: R, t: 0, life: 0.34, col: tier === 2 ? "120,180,255" : "255,150,60" });
  explosions.push({ x: mt.x, y: mt.ty, r: R * 0.55, t: 0, life: 0.24, col: tier === 2 ? "190,227,255" : "255,220,140" });
  juice.addShake(0.16);
  const cols = tier === 2 ? ["#7cc4ff","#bfe3ff","#eaf6ff","#fff"] : ["#ff5030","#ff9d4d","#ffe08a","#fff"];
  spawnParticles(mt.x, mt.ty, { n: 14, col: cols, sp0: 80, sp1: 360, l0: .2, l1: .55, add: true, grav: 300 });
}
function updateMeltdown(dt){
  if(meltFlash > 0) meltFlash = Math.max(0, meltFlash - dt * 0.9);
  if(melt){
    melt.t += dt; melt.spawnT += dt; melt.tickT += dt;
    // 운석 낙하 밀도: 레벨이 높을수록 촘촘하게
    const interval = Math.max(0.045, 0.10 - 0.01 * (melt.lv - 1));
    while(melt.spawnT >= interval){
      melt.spawnT -= interval;
      if(melt.t < melt.dur) spawnMeteor();
    }
    // 화면 전체 화염 폭풍 틱: 화면 안 모든 적에게 지속 피해 (6차 스킬식 절멸)
    if(melt.t < melt.dur && melt.tickT >= SKILL.meltdown.tick){
      melt.tickT -= SKILL.meltdown.tick;
      const vx0 = camX - 40, vx1 = camX + VIEW_W + 40, vy0 = camY - 40, vy1 = camY + VIEW_H + 40;
      for(const m of monsters){
        if(m.dead) continue;
        const r = mobRect(m);
        const cx = r.x + r.w/2, cy = r.y + r.h/2;
        if(cx < vx0 || cx > vx1 || cy < vy0 || cy > vy1) continue;
        hitMonster(m, Math.floor(irand(SKILL.meltdown.dmg[0], SKILL.meltdown.dmg[1]) * magMul() * skillLvMul("meltdown")),
                   140 * sign(cx - player.x || 1), { type: "meltdown", hitstop: 0, shake: 0.05 });
      }
    }
    if(melt.t >= melt.dur && meteors.length === 0) melt = null;
  }
  // 운석 낙하 업데이트 (연출)
  for(let i = meteors.length - 1; i >= 0; i--){
    const mt = meteors[i];
    mt.x += mt.vx * dt; mt.y += mt.vy * dt;
    if(Math.random() < 0.9)
      spawnParticles(mt.x, mt.y, { n: 1, col: mt.tier === 2 ? ["#7cc4ff","#eaf6ff"] : ["#ff6a3a","#ffd27f"],
        sp0: 4, sp1: 24, l0: .12, l1: .3, add: true, r0: 2, r1: 4 });
    if(mt.y >= mt.ty){ meteorImpact(mt); meteors.splice(i, 1); }
  }
}

// ============================== SAVE (localStorage) ==============================
const SAVE_KEY = "arcane_proto_save_v3";
let saveTimer = 8, saveFlash = 0, resetArm = 0;
function saveGame(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 3, level: player.level, exp: player.exp, stats: player.stats,
      skills: player.skills, skillLv: player.skillLv, hasEmber: player.hasEmber,
      quest: { idx: questState.idx, prog: questState.prog, doneAll: questState.doneAll },
      teachers: Object.fromEntries(TEACHERS.map(t=>[t.id, teacherState[t.id]])),
      bossDefeated: boss.defeated,
      map: curMapId, x: Math.round(player.x), y: Math.round(player.y), best: combo.best,
    }));
    saveFlash = 1.4;
  }catch(e){}
}
function loadGame(){
  try{
    const d = JSON.parse(localStorage.getItem(SAVE_KEY) || "null");
    if(!d || d.v !== 3) return;
    player.level = d.level; player.exp = d.exp;
    for(const k in player.stats) if(d.stats && d.stats[k]) player.stats[k] = d.stats[k];
    if(d.skills) Object.assign(player.skills, d.skills);
    if(d.skillLv) Object.assign(player.skillLv, d.skillLv);
    player.hasEmber = !!d.hasEmber;
    if(d.quest) Object.assign(questState, d.quest);
    // 마이그레이션: 퀘스트가 늘어난 뒤엔 doneAll을 재계산 (구버전 doneAll=true가 신규 체인을 건너뛰던 버그 수정)
    questState.idx = clamp(questState.idx || 0, 0, QUESTS.length);
    questState.doneAll = questState.idx >= QUESTS.length;
    // 교사 수업 상태 로드 (신규 {learning,prog} / 구버전 {idx,active,prog} 모두 호환)
    if(d.teachers) for(const id in teacherState){
      const src = d.teachers[id]; if(!src) continue;
      const t = teacherByRef(id), st = teacherState[id];
      if(src.learning !== undefined){ st.learning = src.learning; st.prog = src.prog || 0; }
      else{
        // 구버전: idx=이수한 수업 수(순차), active=진행 중 여부
        const li = src.idx || 0;
        st.learning = (src.active && t && li < t.lessons.length && !player.skills[t.lessons[li].skill]) ? t.lessons[li].skill : null;
        st.prog = st.learning ? (src.prog || 0) : 0;
      }
      // 안전장치: 이미 배운(또는 존재하지 않는) 스킬이 진행 중이면 해제
      if(st.learning && (player.skills[st.learning] || !t.lessons.some(l => l.skill === st.learning))){ st.learning = null; st.prog = 0; }
    }
    if(d.bossDefeated) boss.defeated = true;
    combo.best = d.best || 0;
    const mid = MAPS[d.map] ? d.map : "campus";
    loadMap(mid, d.x ?? 520, d.y);
    player.hp = maxHp(); player.mp = maxMp();
    addFloatText(player.x, player.y - 110, "이어하기 — 저장 데이터 불러옴", "#8be9fd");
  }catch(e){}
}

// ============================== PLAYER UPDATE ==============================
function updatePlayer(dt){
  const pl = player;
  if(pl.dead){
    pl.deadTimer -= dt;
    if(pl.deadTimer <= 0) respawnPlayer();
    return;
  }

  const locked = dialog !== null || showBook || showTrainer || showWorldMap || learnUI !== null || transition !== null;

  // --- 타이머
  pl.boltCd = Math.max(0, pl.boltCd - dt);
  pl.fbCd   = Math.max(0, pl.fbCd - dt);
  pl.fieldCd = Math.max(0, pl.fieldCd - dt);
  pl.lanceCd = Math.max(0, pl.lanceCd - dt);
  pl.novaCd = Math.max(0, pl.novaCd - dt);
  pl.infernoCd = Math.max(0, pl.infernoCd - dt);
  pl.meltCd = Math.max(0, pl.meltCd - dt);
  pl.dashCd = Math.max(0, pl.dashCd - dt);
  pl.dropTimer = Math.max(0, pl.dropTimer - dt);
  pl.iframes = Math.max(0, pl.iframes - dt);
  pl.hurtFlash = Math.max(0, pl.hurtFlash - dt);
  pl.castT = Math.max(0, pl.castT - dt);
  pl.animT += dt;
  pl.mp = Math.min(maxMp(), pl.mp + P.mpRegen * wilRegenMul() * dt);

  const charging = pl.fbCharge >= 0;

  // --- 대시
  if(!locked && !pl.infernoOn && inp.dashP() && pl.dashCd <= 0 && !charging){
    pl.dashTimer = P.dashTime;
    pl.dashCd = P.dashCd * dashCdMul();
    trainStat("agi", 0.5, true);
    pl.dashDir = (inp.left() && !inp.right()) ? -1 : (inp.right() ? 1 : pl.facing);
    pl.facing = pl.dashDir;
    pl.vy = 0;
    spawnParticles(pl.x, pl.y - P.h/2, { n: 10, col: ["#ffd27f","#fff"], sp0: 40, sp1: 140, l0: .15, l1: .35, add: true });
  }

  if(pl.dashTimer > 0){
    pl.dashTimer -= dt;
    pl.vx = pl.dashDir * P.dashSpeed;
    pl.vy = 0;
    pl.trail.push({ x: pl.x, y: pl.y, t: 0.22, f: pl.facing });
  }else{
    const mv = (locked || pl.infernoOn) ? 0 : (inp.right()?1:0) - (inp.left()?1:0);
    const ctrl = pl.onGround ? 1 : P.airControl;
    const speedCap = (charging ? P.runSpeed * 0.4 : P.runSpeed) * agiSpeedMul();
    if(mv !== 0){
      pl.facing = mv;
      pl.vx += mv * P.accel * ctrl * dt;
      pl.vx = clamp(pl.vx, -speedCap, speedCap);
    }else{
      const f = P.friction * ctrl * dt;
      if(Math.abs(pl.vx) <= f) pl.vx = 0; else pl.vx -= sign(pl.vx)*f;
    }
    if(!locked && !pl.infernoOn && inp.jumpP()){
      if(pl.onGround){
        if(inp.down() && pl.standingDrop){
          // 아래 점프: 발판·위층 바닥을 통과해 아래 블럭으로
          pl.dropTimer = P.dropTime;
          pl.onGround = false;
          pl.vy = 60;   // 즉시 낙하 시작
          spawnParticles(pl.x, pl.y + 2, { n: 5, col: "#cbd5e1", sp0: 20, sp1: 70, l0: .15, l1: .3, ang: Math.PI/2, spread: 1.0 });
        }else{
          pl.vy = P.jumpV;
          pl.onGround = false;
          trainStat("agi", 0.2, true);
          spawnParticles(pl.x, pl.y, { n: 6, col: "#cbd5e1", sp0: 30, sp1: 90, l0: .2, l1: .4, ang: -Math.PI/2, spread: 1.2 });
        }
      }
    }
    pl.vy += GRAV * dt;
  }

  for(let i=pl.trail.length-1;i>=0;i--){
    pl.trail[i].t -= dt;
    if(pl.trail[i].t <= 0) pl.trail.splice(i,1);
  }

  // --- 이동 & 충돌
  pl.x = clamp(pl.x + pl.vx*dt, P.w/2, mapW - P.w/2);
  if(curMapId === "forest"){
    if(boss.active && BOSS_M && !BOSS_M.dead){
      pl.x = clamp(pl.x, ARENA_L + 20, ARENA_R - 20);
    }else if(!boss.defeated && !bossReady()){
      if(pl.x > GATE_X - 24){
        pl.x = GATE_X - 24;
        if(Math.random() < 0.02) addFloatText(GATE_X - 60, GROUND_Y - 120, "남은 퀘스트를 완료하면 시험장이 열린다", "#f0abfc");
      }
    }
  }
  const prevFeet = pl.y;
  pl.y += pl.vy*dt;
  pl.onGround = false;
  pl.standingOneway = false;
  pl.standingDrop = false;
  if(pl.vy >= 0){
    for(const pf of platforms){
      // 하강 점프 중엔 최하층(base)을 제외한 모든 발판/층 통과
      if(!pf.base && pl.dropTimer > 0) continue;
      if(pl.x < pf.x || pl.x > pf.x + pf.w) continue;
      if(prevFeet <= pf.y + 1 && pl.y >= pf.y){
        pl.y = pf.y; pl.vy = 0; pl.onGround = true;
        pl.standingOneway = !pf.solidGround;
        pl.standingDrop = !pf.base;   // 최하층이 아니면 ↓+Space로 아래로
        break;
      }
    }
  }
  // --- 계단(대각선 발판): 걸어서 부드럽게 오르내림 (본관 층 이동)
  if(pl.vy >= 0 && pl.dropTimer <= 0){
    for(const s of stairs){
      const xa = Math.min(s.x0, s.x1), xb = Math.max(s.x0, s.x1);
      if(pl.x < xa || pl.x > xb) continue;
      const t = (pl.x - s.x0) / (s.x1 - s.x0);
      const sy = s.y0 + (s.y1 - s.y0) * clamp(t, 0, 1);
      if(prevFeet <= sy + STAIR_SNAP && pl.y >= sy - 6){
        pl.y = sy; pl.vy = 0; pl.onGround = true;
        break;
      }
    }
  }

  // --- 스킬 (전부 수업으로 습득해야 사용 가능)
  if(!locked && !pl.infernoOn && inp.boltP() && skillUsable("bolt") && pl.boltCd <= 0 && !charging && pl.dashTimer <= 0){
    pl.boltCd = SKILL.bolt.cd;
    fireBolt();
  }
  if(!locked && !pl.infernoOn && !charging && inp.fbHeld() && skillUsable("fireball") && pl.fbCd <= 0 && pl.mp >= SKILL.fireball.mp && pl.dashTimer <= 0){
    pl.fbCharge = 0;
  }
  if(charging){
    if(locked){
      pl.fbCharge = -1;
    }else{
      pl.fbCharge = Math.min(SKILL.fireball.maxCharge, pl.fbCharge + dt * chargeSpeedMul());
      if((pl.fbCharge/SKILL.fireball.maxCharge) > 0.35 && Math.random() < 0.5){
        spawnParticles(pl.x + pl.facing*24, pl.y - 56, { n: 1, col: ["#ff9d4d","#ffd27f"], sp0: 10, sp1: 60, l0: .15, l1: .3, add: true });
      }
      if(!inp.fbHeld()){
        const t = pl.fbCharge;
        pl.fbCharge = -1;
        if(t >= SKILL.fireball.minCharge){
          pl.mp -= SKILL.fireball.mp;
          pl.fbCd = SKILL.fireball.cdAfter;
          fireFireball(t / SKILL.fireball.maxCharge);
        }
      }
    }
  }
  if(!locked && !pl.infernoOn && pressed["c"] && skillUsable("field") &&
     pl.fieldCd <= 0 && pl.mp >= SKILL.field.mp && pl.dashTimer <= 0 && pl.fbCharge < 0){
    castField();
  }
  if(!locked && !pl.infernoOn && pressed["v"] && skillUsable("lance") &&
     pl.lanceCd <= 0 && pl.mp >= SKILL.lance.mp && pl.dashTimer <= 0 && pl.fbCharge < 0){
    pl.lanceCd = SKILL.lance.cd;
    fireLance();
  }
  if(!locked && !pl.infernoOn && pressed["s"] && skillUsable("nova") &&
     pl.novaCd <= 0 && pl.mp >= SKILL.nova.mp && pl.dashTimer <= 0 && pl.fbCharge < 0){
    castNova();
  }

  // --- 고급 마법: Q 인페르노 번 (채널링 광선 — 유지할수록 화력 폭증)
  const wantBeam = !locked && keys["q"] && skillUsable("inferno") &&
                   pl.dashTimer <= 0 && pl.fbCharge < 0;
  if(!pl.infernoOn && wantBeam && pl.infernoCd <= 0 && pl.mp >= SKILL.inferno.mpStart){
    pl.infernoOn = true; pl.infernoT = 0; pl.infernoTick = 0;
    pl.mp -= SKILL.inferno.mpStart;
    juice.addShake(0.15);
  }
  if(pl.infernoOn){
    if(!wantBeam || pl.mp <= 0.5){
      pl.infernoOn = false; pl.infernoHitX = null;
      pl.infernoCd = SKILL.inferno.cd;
      pl.castT = 0.2;
    }else{
      pl.mp -= SKILL.inferno.drain * dt;
      pl.infernoT += dt; pl.infernoTick += dt;
      pl.castT = 0.2;
      const heat = Math.min(1, pl.infernoT / SKILL.inferno.rampT);
      const tier = skillTier("inferno");
      // 전방 레이에서 가장 가까운 적
      const by = pl.y - 30;
      let target = null, bestDx = Infinity;
      for(const m of monsters){
        if(m.dead) continue;
        const r = mobRect(m);
        const cx = r.x + r.w/2;
        const dx = (cx - pl.x) * pl.facing;
        if(dx < 10 || dx > SKILL.inferno.range) continue;
        if(r.y > by + 55 || r.y + r.h < by - 55) continue;
        if(dx < bestDx){ bestDx = dx; target = m; }
      }
      pl.infernoHitX = target ? (target.x - pl.facing * MOB_DEFS[target.type].w * 0.3) : null;
      if(pl.infernoTick >= SKILL.inferno.tick){
        pl.infernoTick -= SKILL.inferno.tick;
        if(target){
          const ramp = 1 + heat * heat * SKILL.inferno.rampMax;   // 최대 3.6배
          const dmg = Math.floor(irand(SKILL.inferno.dmg[0], SKILL.inferno.dmg[1]) * magMul() * skillLvMul("inferno") * ramp);
          hitMonster(target, dmg, 26 * pl.facing, { type: "inferno", hitstop: 0, shake: 0.02 + heat * 0.06 });
          const ix = pl.infernoHitX ?? (pl.x + pl.facing * 100);
          spawnParticles(ix, by, { n: 2 + Math.floor(heat * 4),
            col: tier === 2 ? ["#7cc4ff","#eaf6ff","#fff"] : heat > 0.66 ? ["#fff","#ffe08a","#ff7b3a"] : ["#ff9d4d","#ffd27f"],
            sp0: 60, sp1: 200 + heat * 220, l0: .1, l1: .3, add: true });
        }
      }
    }
  }

  // --- 고급 마법 제2식: R 멸화 (화면 전체 별똥별 대재앙)
  if(!locked && !pl.infernoOn && !melt && pressed["r"] && skillUsable("meltdown") &&
     pl.meltCd <= 0 && pl.mp >= SKILL.meltdown.mp && pl.dashTimer <= 0 && pl.fbCharge < 0){
    castMeltdown();
  }
}

function respawnPlayer(){
  player.dead = false;
  loadMap("school", 900, 1240);   // 본관 1F 양호실에서 깨어남
  player.hp = maxHp(); player.mp = maxMp();
  player.iframes = 2.0;
  addFloatText(player.x, player.y - 80, "양호실에서 깨어났다 — 다시 도전!", "#8be9fd");
}

function hurtPlayer(dmg, fromX){
  const pl = player;
  if(pl.iframes > 0 || pl.dashTimer > 0 || pl.dead) return;
  dmg = Math.max(1, Math.round(dmg * vitDmgMul()));
  trainStat("vit", 1.2, true);
  pl.hp -= dmg;
  pl.iframes = P.hurtIframes;
  pl.hurtFlash = 0.3;
  pl.vx = sign(pl.x - fromX) * 320;
  pl.vy = -300;
  pl.onGround = false;
  if(pl.fbCharge >= 0) pl.fbCharge = -1;
  if(pl.infernoOn){ pl.infernoOn = false; pl.infernoHitX = null; pl.infernoCd = SKILL.inferno.cd; }
  juice.addShake(0.45); juice.addHitstop(0.06);
  spawnParticles(pl.x, pl.y - P.h/2, { n: 10, col: ["#ff6b6b","#fca5a5"], sp0: 80, sp1: 240, l0: .2, l1: .45, grav: 500 });
  addDmgNumber(pl.x, pl.y - P.h - 10, dmg, false);
  if(pl.hp <= 0){
    pl.hp = 0; pl.dead = true; pl.deadTimer = 2.0;
    combo.count = 0; combo.timer = 0;
    juice.addShake(0.9); juice.addHitstop(0.15);
    spawnParticles(pl.x, pl.y - P.h/2, { n: 26, col: ["#ff6b6b","#fff"], sp0: 100, sp1: 380, l0: .3, l1: .7, grav: 600 });
  }
}

function gainExp(amount){
  if(amount <= 0) return;
  player.exp += amount;
  addFloatText(player.x, player.y - P.h - 26, "EXP +" + amount, "#a3e635");
  while(player.exp >= expNeed(player.level)){
    player.exp -= expNeed(player.level);
    player.level++;
    trainStat("mag", 15, false);
    player.hp = maxHp(); player.mp = maxMp();
    addFloatText(player.x, player.y - P.h - 50, "LEVEL UP!  Lv." + player.level, "#fbbf24");
    juice.addShake(0.35); juice.addHitstop(0.08); juice.flash = 0.25;
    spawnParticles(player.x, player.y - P.h/2, { n: 30, col: ["#fbbf24","#fde68a","#fff"], sp0: 80, sp1: 340, l0: .4, l1: .9, add: true, grav: -60 });
  }
}

// ============================== PROJECTILES ==============================
const projectiles = [];
const explosions = [];

function fireBolt(){
  const pl = player;
  const dmg = Math.floor(irand(SKILL.bolt.dmg[0], SKILL.bolt.dmg[1]) * magMul() * skillLvMul("bolt"));
  pl.castT = 0.16;
  const lv = getSkillLv("bolt"), tier = skillTier("bolt");
  projectiles.push({
    type: "bolt", x: pl.x + pl.facing*26, y: pl.y - 26,
    vx: pl.facing * (SKILL.bolt.speed + 30*(lv-1)), r: 6 + (lv-1), dmg,
    dist: 0, maxDist: SKILL.bolt.range + 30*(lv-1), kb: 90 + 10*(lv-1),
    hitstop: 0.025, shake: 0.06, tier,
  });
  pl.vx -= pl.facing * 20;
  const cols = tier === 2 ? ["#7cc4ff","#bfe3ff"] : ["#ffb35c","#ffe08a"];
  spawnParticles(pl.x + pl.facing*26, pl.y - 26, { n: 4 + lv, col: cols, ang: pl.facing>0?0:Math.PI, spread: .5, sp0: 60, sp1: 160, l0: .1, l1: .25, add: true });
}

function fireFireball(t){
  const pl = player;
  const base = irand(SKILL.fireball.dmg[0], SKILL.fireball.dmg[1]);
  const dmg = Math.floor(base * lerp(1, SKILL.fireball.dmgMaxMul, t) * magMul() * skillLvMul("fireball"));
  pl.castT = 0.22;
  const lv = getSkillLv("fireball"), tier = skillTier("fireball");
  projectiles.push({
    type: "fireball", x: pl.x + pl.facing*30, y: pl.y - 30,
    vx: pl.facing * SKILL.fireball.speed, r: lerp(9, 18, t) * (1 + 0.1*(lv-1)), dmg,
    dist: 0, maxDist: 640, kb: lerp(140, 320, t),
    aoe: lerp(46, 110, t) * (1 + 0.13*(lv-1)),   // 레벨당 폭발 반경 확장
    charge: t, tier,
    hitstop: lerp(0.04, 0.11, t), shake: lerp(0.15, 0.5, t) * (1 + 0.08*(lv-1)),
  });
  pl.vx -= pl.facing * lerp(40, 160, t);
  juice.addShake(0.08 + t*0.1);
  const cols = tier === 2 ? ["#7cc4ff","#bfe3ff"] : ["#ff7b3a","#ffd27f"];
  spawnParticles(pl.x + pl.facing*30, pl.y - 30, { n: 8 + Math.floor(t*8) + lv*2, col: cols, ang: pl.facing>0?0:Math.PI, spread: .6, sp0: 80, sp1: 260, l0: .15, l1: .3, add: true });
}

function fireLance(){
  const pl = player;
  const lv = getSkillLv("lance"), tier = skillTier("lance");
  pl.mp -= SKILL.lance.mp;
  pl.castT = 0.2;
  const dmg = Math.floor(irand(SKILL.lance.dmg[0], SKILL.lance.dmg[1]) * magMul() * skillLvMul("lance"));
  projectiles.push({
    type: "lance", x: pl.x + pl.facing*30, y: pl.y - 28,
    vx: pl.facing * (SKILL.lance.speed + 40*(lv-1)), r: 10 + 1.5*(lv-1), dmg,
    dist: 0, maxDist: SKILL.lance.range + 50*(lv-1), kb: 200 + 15*(lv-1),
    pierce: true, hitSet: new Set(), tier,
    hitstop: 0.03, shake: 0.12,
  });
  pl.vx -= pl.facing * 60;
  juice.addShake(0.12);
  const cols = tier === 2 ? ["#7cc4ff","#eaf6ff"] : ["#ff7b3a","#ffe08a"];
  spawnParticles(pl.x + pl.facing*34, pl.y - 28, { n: 10 + lv*2, col: cols, ang: pl.facing>0?0:Math.PI, spread: .4, sp0: 120, sp1: 320, l0: .12, l1: .3, add: true });
}

function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const pr = projectiles[i];
    pr.x += pr.vx*dt;
    pr.dist += Math.abs(pr.vx)*dt;
    if(pr.type === "fireball" || pr.type === "lance" || Math.random() < 0.4){
      const trailCol = pr.tier === 2 ? ["#7cc4ff","#bfe3ff"] : pr.type==="bolt" ? ["#ffd27f"] : ["#ff7b3a","#ffb35c"];
      spawnParticles(pr.x, pr.y, { n: 1, col: trailCol, sp0: 5, sp1: 40, l0: .1, l1: .28, add: true, r0: 2, r1: pr.type==="bolt"?3:5 });
    }
    if(pr.pierce){
      // 관통: 각 몬스터에 1회씩 타격, 사거리 끝까지 비행
      for(const m of monsters){
        if(m.dead || pr.hitSet.has(m)) continue;
        const r = mobRect(m);
        if(pr.x + pr.r > r.x && pr.x - pr.r < r.x + r.w && pr.y + pr.r > r.y && pr.y - pr.r < r.y + r.h){
          pr.hitSet.add(m);
          hitMonster(m, pr.dmg, pr.kb * sign(pr.vx), pr);
        }
      }
      if(pr.dist >= pr.maxDist || pr.x < -40 || pr.x > mapW + 40){
        projectiles.splice(i,1);
      }
    }else{
      let hit = false;
      for(const m of monsters){
        if(m.dead) continue;
        const r = mobRect(m);
        if(pr.x + pr.r > r.x && pr.x - pr.r < r.x + r.w && pr.y + pr.r > r.y && pr.y - pr.r < r.y + r.h){
          hit = true;
          if(pr.type === "fireball") explodeFireball(pr);
          else hitMonster(m, pr.dmg, pr.kb * sign(pr.vx), pr);
          break;
        }
      }
      if(hit || pr.dist >= pr.maxDist || pr.x < -40 || pr.x > mapW + 40){
        if(!hit && pr.type === "fireball") explodeFireball(pr);
        projectiles.splice(i,1);
      }
    }
  }
}

function explodeFireball(pr){
  juice.addShake(pr.shake); juice.addHitstop(pr.hitstop);
  const cols = pr.tier === 2 ? ["#7cc4ff","#bfe3ff","#eaf6ff","#fff"] : ["#ff7b3a","#ffb35c","#ffe08a","#fff"];
  spawnParticles(pr.x, pr.y, { n: 14 + Math.floor(pr.charge*18) + (pr.tier||0)*8, col: cols, sp0: 100, sp1: 200 + pr.charge*260, l0: .2, l1: .5, add: true });
  spawnParticles(pr.x, pr.y, { n: 6, col: "#4b5563", sp0: 30, sp1: 90, l0: .3, l1: .7, grav: -40, r0: 4, r1: 8 });
  explosions.push({ x: pr.x, y: pr.y, r: pr.aoe, t: 0, life: 0.22, col: pr.tier === 2 ? "120,180,255" : "255,170,80" });
  if(pr.tier >= 1) explosions.push({ x: pr.x, y: pr.y, r: pr.aoe * 0.55, t: 0, life: 0.32, col: pr.tier === 2 ? "190,227,255" : "255,220,140" });
  let hitAny = false;
  for(const m of monsters){
    if(m.dead) continue;
    const r = mobRect(m);
    const cx = r.x + r.w/2, cy = r.y + r.h/2;
    const d = Math.hypot(cx - pr.x, cy - pr.y);
    if(d <= pr.aoe + Math.max(r.w, r.h)/2){
      hitMonster(m, pr.dmg, pr.kb * sign(cx - pr.x || pr.vx), pr);
      hitAny = true;
    }
  }
  if(hitAny && pr.charge >= 0.999){
    lessonEvent("maxChargeHit");
    trainStat("wil", 1.0, true);
  }
}

// ============================== MONSTERS ==============================
const monsters = [];
function spawnMob(type, x, patrolMin, patrolMax, y){
  const d = MOB_DEFS[type];
  const by = y ?? GROUND_Y;
  monsters.push({
    type, x, y: by, baseY: by, vx: 0, dir: Math.random()<0.5?-1:1,
    hp: d.hp, maxHp: d.hp,
    patrolMin: patrolMin ?? x - 120, patrolMax: patrolMax ?? x + 120,
    spawnX: x, dead: false, respawn: 0,
    hurtFlash: 0, hpBarTimer: 0, kbVx: 0,
    hopTimer: rand(1, 3), vy: 0, onGround: true,
    animT: rand(0, 10),
  });
}

function mobRect(m){
  const d = MOB_DEFS[m.type];
  return { x: m.x - d.w/2, y: m.y - d.h, w: d.w, h: d.h };
}

function updateMonsters(dt){
  for(const m of monsters){
    const d = MOB_DEFS[m.type];
    m.animT += dt;
    if(m.dead){
      m.respawn -= dt;
      if(m.respawn <= 0 && m.type !== "dummy" && m.type !== "boss"){
        m.dead = false; m.hp = m.maxHp; m.x = m.spawnX; m.y = m.baseY;
        m.kbVx = 0; m.hpBarTimer = 0;
        spawnParticles(m.x, m.y - d.h/2, { n: 8, col: "#a78bfa", sp0: 40, sp1: 140, l0: .2, l1: .5, add: true });
      }
      continue;
    }
    m.hurtFlash = Math.max(0, m.hurtFlash - dt);
    m.hpBarTimer = Math.max(0, m.hpBarTimer - dt);

    if(Math.abs(m.kbVx) > 1){
      m.x += m.kbVx * dt;
      m.kbVx *= Math.pow(0.0018, dt);
    }else m.kbVx = 0;

    if(m.type === "bat"){
      // 부유 몬스터: 중력 없이 좌우 순찰 + 상하 흔들림
      m.x += m.dir * d.speed * dt;
      if(m.x < m.patrolMin){ m.x = m.patrolMin; m.dir = 1; }
      if(m.x > m.patrolMax){ m.x = m.patrolMax; m.dir = -1; }
      m.y = m.baseY + Math.sin(m.animT * 3) * 16;
    }else if(d.speed > 0){
      m.x += m.dir * d.speed * dt;
      if(m.x < m.patrolMin){ m.x = m.patrolMin; m.dir = 1; }
      if(m.x > m.patrolMax){ m.x = m.patrolMax; m.dir = -1; }
      if(m.type === "slime"){
        m.hopTimer -= dt;
        if(m.onGround && m.hopTimer <= 0){
          m.vy = -420; m.onGround = false; m.hopTimer = rand(1.2, 2.8);
        }
      }
      if(!m.onGround){
        m.vy += GRAV * dt;
        m.y += m.vy * dt;
        if(m.y >= GROUND_Y){ m.y = GROUND_Y; m.vy = 0; m.onGround = true; }
      }
    }
    m.x = clamp(m.x, 40, mapW - 40);

    if(d.contact && !player.dead){
      const pr = playerRect(), r = mobRect(m);
      if(pr.x < r.x + r.w && pr.x + pr.w > r.x && pr.y < r.y + r.h && pr.y + pr.h > r.y){
        hurtPlayer(d.dmg, m.x);
      }
    }
  }
}

function hitMonster(m, baseDmg, kb, pr){
  const d = MOB_DEFS[m.type];
  const crit = Math.random() < critChance();
  const dmg = Math.floor(baseDmg * (crit ? CRIT_MUL : 1));
  m.hp -= dmg;
  m.hurtFlash = 0.12;
  m.hpBarTimer = 3.0;
  m.kbVx = kb * (crit ? 1.4 : 1) * strMul() * (m.type === "boss" ? 0.07 : 1);
  // 수업 과제·행동 성장 훅
  if(pr.type === "bolt"){ lessonEvent("boltHit"); trainStat("mag", 0.5, true); }
  if(pr.type === "fireball") trainStat("mag", 1.0, true);
  if(pr.type === "field") lessonEvent("fieldHit");
  if(pr.type === "lance"){ lessonEvent("lanceHit"); trainStat("mag", 0.7, true); }
  if(pr.type === "nova"){ lessonEvent("novaHit"); trainStat("mag", 1.0, true); }
  if(pr.type === "inferno"){ lessonEvent("infernoHit"); trainStat("mag", 0.3, true); }
  if(pr.type === "meltdown"){ lessonEvent("meltdownHit"); trainStat("mag", 0.4, true); }
  const r = mobRect(m);
  addDmgNumber(r.x + r.w/2, r.y - 6, dmg, crit);
  combo.hit();
  juice.addShake((pr.shake ?? 0.08) * (crit ? 1.5 : 1));
  juice.addHitstop((pr.hitstop ?? 0.02) * (crit ? 1.6 : 1));
  spawnParticles(r.x + r.w/2, r.y + r.h/2, { n: crit ? 12 : 6, col: ["#ffb35c","#fff","#ffe08a"], sp0: 60, sp1: crit?300:180, l0: .15, l1: .4, add: true });
  if(m.hp <= 0 && m.type !== "dummy"){
    m.dead = true; m.respawn = RESPAWN_TIME;
    juice.addShake(0.2); juice.addHitstop(0.05);
    spawnParticles(m.x, m.y - d.h/2, { n: 18, col: [d.color, "#fff"], sp0: 80, sp1: 320, l0: .25, l1: .6, grav: 600 });
    gainExp(d.exp);
    questEvent("kill", m.type);
    trainStat("str", 1.5, true);
    if(m.type === "boss"){
      boss.defeated = true; boss.active = false;
      spikes.length = 0; eprojs.length = 0;
      juice.addHitstop(0.3); juice.addShake(1.0); juice.flash = 0.5;
      spawnParticles(m.x, m.y - 60, { n: 60, col: ["#7a9b5e","#a3e635","#fff","#fbbf24"], sp0: 100, sp1: 520, l0: .4, l1: 1.0, grav: 300 });
      questBanner("실기 시험 합격! — 1학기 수료!", "캠퍼스로 돌아가자 — 중급 교사 이그니아가 기다린다!", "새로운 마법: 플레임 랜스(V), 폭염 노바(S)");
      saveGame();
    }
    if(m.type === "firelord"){
      m.respawn = Infinity;   // 퀘스트 미니보스 — 재등장 없음
      juice.addHitstop(0.3); juice.addShake(1.0); juice.flash = Math.max(juice.flash, 0.5);
      spawnParticles(m.x, m.y - 60, { n: 70, col: ["#ff5030","#ff9d4d","#ffe08a","#fff"], sp0: 120, sp1: 560, l0: .4, l1: 1.0, grav: 260 });
      questBanner("화염 군주 격파!", "심장에서 『멸화의 불씨』가 굴러나왔다 — E로 회수!", "");
      saveGame();
    }
  }
}

let BOSS_M = null;
const boss = { active: false, defeated: false, state: "wait", t: 1.2, chargeDir: 1 };
const spikes = [];
const eprojs = [];
function bossReady(){ return questState.idx >= 5 || questState.doneAll; }
function bossPhase2(){ return BOSS_M && BOSS_M.hp <= BOSS_M.maxHp * 0.5; }

function resetBoss(){
  if(!BOSS_M) return;
  boss.active = false; boss.state = "wait"; boss.t = 1.2;
  BOSS_M.hp = BOSS_M.maxHp; BOSS_M.x = BOSS_M.spawnX; BOSS_M.kbVx = 0;
  spikes.length = 0; eprojs.length = 0;
}

function updateBoss(dt){
  if(curMapId !== "forest" || !BOSS_M) return;
  const m = BOSS_M;
  if(boss.defeated || m.dead) return;
  const pl = player;
  if(!boss.active){
    if(bossReady() && !pl.dead && pl.x > ARENA_L + 40){
      boss.active = true; boss.state = "wait"; boss.t = 1.6;
      questBanner("학기말 실기 시험 개시!", `${MOB_DEFS.boss.name}을(를) 쓰러뜨려라`, "몸이 하얗게 빛나면 공격 예고 — 대시(Shift)로 회피!");
      juice.addShake(0.4);
    }
    return;
  }
  if(pl.dead){ resetBoss(); return; }

  const p2 = bossPhase2();
  m.dir = sign(pl.x - m.x);
  boss.t -= dt;
  switch(boss.state){
    case "wait":
      if(boss.t <= 0){
        const r = Math.random();
        boss.state = r < 0.4 ? "windup_charge" : r < 0.75 ? "windup_spike" : "windup_seed";
        boss.t = p2 ? 0.5 : 0.7;
      }
      break;
    case "windup_charge": case "windup_spike": case "windup_seed":
      if(boss.t <= 0){
        if(boss.state === "windup_charge"){
          boss.state = "charge"; boss.t = 1.0; boss.chargeDir = m.dir;
          juice.addShake(0.15);
        }else if(boss.state === "windup_spike"){
          boss.state = "recover"; boss.t = 0.9;
          spawnSpikes(p2 ? 3 : 2);
          juice.addShake(0.35);
        }else{
          boss.state = "recover"; boss.t = 0.8;
          throwSeeds(p2 ? 4 : 3);
        }
      }
      break;
    case "charge":
      m.x += boss.chargeDir * (p2 ? 620 : 500) * dt;
      if(Math.random() < 0.6)
        spawnParticles(m.x - boss.chargeDir*44, m.y - 16, { n: 1, col: ["#5e7a4a","#8a683d"], sp0: 30, sp1: 110, l0: .2, l1: .4, grav: 300 });
      if(m.x < ARENA_L + 70 || m.x > ARENA_R - 70 || boss.t <= 0){
        boss.state = "recover"; boss.t = p2 ? 0.5 : 0.8;
        juice.addShake(0.25);
      }
      break;
    case "recover":
      if(boss.t <= 0){ boss.state = "wait"; boss.t = p2 ? rand(0.6, 1.0) : rand(1.0, 1.5); }
      break;
  }
  m.x = clamp(m.x, ARENA_L + 60, ARENA_R - 60);
}

function spawnSpikes(n){
  const xs = [player.x];
  for(let i = 1; i < n; i++) xs.push(player.x + (i % 2 ? -1 : 1) * Math.ceil(i/2) * 140);
  for(const sx of xs) spikes.push({ x: clamp(sx, ARENA_L + 40, ARENA_R - 40), warn: 0.75, active: 0 });
}
function updateSpikes(dt){
  for(let i = spikes.length - 1; i >= 0; i--){
    const s = spikes[i];
    if(s.warn > 0){
      s.warn -= dt;
      if(s.warn <= 0){
        s.active = 0.45;
        juice.addShake(0.22);
        spawnParticles(s.x, GROUND_Y, { n: 10, col: ["#7a9b5e","#4a6741","#8a683d"], sp0: 60, sp1: 240, l0: .2, l1: .5, grav: 500 });
      }
    }else{
      s.active -= dt;
      if(s.active > 0.12 && !player.dead && Math.abs(player.x - s.x) < 46 && player.y > GROUND_Y - 72){
        hurtPlayer(15, s.x + (player.x < s.x ? 40 : -40));
      }
      if(s.active <= 0) spikes.splice(i, 1);
    }
  }
}
function throwSeeds(n){
  const m = BOSS_M;
  for(let i = 0; i < n; i++){
    const tx = player.x + rand(-70, 70);
    const t0 = rand(0.75, 1.05);
    const sx = m.x, sy = m.y - 92;
    eprojs.push({ x: sx, y: sy, vx: (tx - sx)/t0, vy: (GROUND_Y - sy - 0.5*GRAV*t0*t0)/t0, r: 9 });
  }
}
function updateEprojs(dt){
  for(let i = eprojs.length - 1; i >= 0; i--){
    const e = eprojs[i];
    e.vy += GRAV * dt; e.x += e.vx * dt; e.y += e.vy * dt;
    const pr = playerRect();
    if(!player.dead && e.x > pr.x - e.r && e.x < pr.x + pr.w + e.r && e.y > pr.y - e.r && e.y < pr.y + pr.h + e.r){
      hurtPlayer(12, e.x - sign(e.vx) * 30);
      eprojs.splice(i, 1); continue;
    }
    if(e.y >= GROUND_Y){
      spawnParticles(e.x, GROUND_Y, { n: 6, col: ["#7a9b5e","#a3e635"], sp0: 40, sp1: 160, l0: .2, l1: .4, grav: 400 });
      eprojs.splice(i, 1);
    }
  }
}

// ============================== UPDATE ==============================
let showHelp = true, showBook = false, showTrainer = false, bookPage = 0;
let gameState = "title", titleT = 0, showOptions = false, optResetArm = 0, showWorldMap = false;

// 타이틀 버튼 영역
const TITLE_BTN = {
  play: { x: VIEW_W/2 - 150, y: 462, w: 300, h: 58 },
  opts: { x: VIEW_W/2 - 150, y: 534, w: 300, h: 50 },
};
const OPT_ROWS = [   // 옵션 패널 행 (y는 renderOptions와 동일 계산)
  { key: "shake", label: "화면 흔들림" },
  { key: "dmg",   label: "데미지 숫자" },
  { key: "reset", label: "저장 데이터 초기화" },
  { key: "close", label: "닫기" },
];
function inRect(mx, my, r){ return mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h; }

function updateTitle(dt){
  titleT += dt;
  optResetArm = Math.max(0, optResetArm - dt);
  // 떠오르는 불꽃 파티클
  if(Math.random() < 0.35)
    spawnParticles(camX + rand(0, VIEW_W), camY + VIEW_H + 10,
      { n: 1, col: ["#ff9d4d","#ffd27f","#7c5cff"], sp0: 20, sp1: 60, ang: -Math.PI/2, spread: .4, l0: 2.0, l1: 4.0, grav: -30, drag: 0.995, r0: 2, r1: 4 });
  updateParticles(dt);

  if(showOptions){
    // 옵션: 클릭으로 값 순환 / Esc·닫기
    if(pressed["Escape"]){ showOptions = false; }
    if(mouse.clicked){
      const px2 = VIEW_W/2 - 250, py = 200;
      OPT_ROWS.forEach((row, i)=>{
        const r = { x: px2 + 30, y: py + 70 + i*64, w: 440, h: 48 };
        if(!inRect(mouse.x, mouse.y, r)) return;
        if(row.key === "shake"){ OPTS.shake = OPTS.shake === 1 ? 0.5 : OPTS.shake === 0.5 ? 0 : 1; saveOpts(); }
        else if(row.key === "dmg"){ OPTS.dmgNum = !OPTS.dmgNum; saveOpts(); }
        else if(row.key === "reset"){
          if(optResetArm > 0){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} location.reload(); }
          else optResetArm = 3;
        }
        else if(row.key === "close") showOptions = false;
      });
    }
  }else{
    if(pressed["Enter"] || pressed["space"] || pressed["z"]){ gameState = "play"; }
    if(mouse.clicked){
      if(inRect(mouse.x, mouse.y, TITLE_BTN.play)) gameState = "play";
      else if(inRect(mouse.x, mouse.y, TITLE_BTN.opts)) showOptions = true;
    }
  }
  for(const k in pressed) pressed[k] = false;
  mouse.clicked = false;
}

function update(dt){
  if(gameState === "title"){ updateTitle(dt); return; }
  if(learnUI){
    // 수업 선택 창: ↑/↓ 이동, E/Enter/Space 확정, 클릭, Esc/Tab 닫기
    if(pressed["Escape"] || pressed["Tab"]){ learnUI = null; pressed["e"] = pressed["Tab"] = false; }
    else{
      if(pressed["ArrowUp"]) learnMove(-1);
      if(pressed["ArrowDown"]) learnMove(1);
      if(mouse.clicked){ learnClick(mouse.x, mouse.y); mouse.clicked = false; }
      if(pressed["e"] || pressed["space"] || pressed["Enter"]){ learnConfirm(); pressed["e"] = pressed["space"] = pressed["Enter"] = false; }
    }
  }else if(showTrainer){
    // 스킬 강화 패널: [1~7] 강화, E/Tab/Esc 닫기
    if(pressed["e"] || pressed["Tab"] || pressed["Escape"]){
      showTrainer = false;
      pressed["e"] = pressed["Tab"] = pressed["Escape"] = false;   // 같은 프레임 재상호작용 방지
    }else{
      for(let i = 0; i < SKILL_ORDER.length; i++){
        if(pressed[String(i+1)]) upgradeSkill(SKILL_ORDER[i]);
      }
    }
  }else{
    if(inp.helpP()) showHelp = !showHelp;
    if(inp.bookP()){ showBook = !showBook; showWorldMap = false; bookPage = 0; }
    if(pressed["m"] || (showWorldMap && pressed["Escape"])){ showWorldMap = !showWorldMap; showBook = false; }
    if(showBook && (pressed["ArrowLeft"] || pressed["ArrowRight"])) bookPage = 1 - bookPage;
  }

  // --- 맵 전환
  if(transition){
    transition.t += dt * 3;
    if(transition.phase === "out" && transition.t >= 1){
      loadMap(transition.to, transition.tx, transition.ty);
      transition.phase = "in"; transition.t = 0;
      saveGame();
    }else if(transition.phase === "in" && transition.t >= 1){
      transition = null;
    }
  }

  // --- 대화 / 포탈 / 교사 상호작용
  if(dialog){
    if(pressed["e"] || pressed["z"] || pressed["space"]) advanceDialog();
  }else if(!showBook && !showTrainer && !showWorldMap && !learnUI && !transition && !player.dead){
    let used = false;
    if(player.onGround && (pressed["ArrowUp"] || pressed["e"])){
      for(const p of portals){
        const py = p.y ?? GROUND_Y;
        if(Math.abs(player.x - p.x) < 46 && Math.abs(player.y - py) < 90){
          startTransition(p.to, p.tx, p.ty); used = true; break;
        }
      }
    }
    if(!used && !transition && pressed["e"]){
      for(const n of npcs){
        const ny = n.y ?? GROUND_Y;
        if(Math.abs(player.x - n.x) < 56 && Math.abs(player.y - ny) < 78){ talkNPC(n); used = true; break; }
      }
    }
    if(!used && !transition && pressed["e"] && mapDoor && Math.abs(player.x - mapDoor.x) < 62){
      talkToDoor(); used = true;
    }
    // 고급 마법 퀘스트 조사 지점
    if(!used && !transition && pressed["e"]){
      if(curMapId === "library" && Math.abs(player.x - 950) < 64){
        inspectBanned();
      }else if(curMapId === "basement" && questState.idx === QI_TOME && Math.abs(player.x - 3100) < 55){
        pickupTome();
      }else if(curMapId === "firevil" && questState.idx === QI_M2_EMBER && Math.abs(player.x - 2700) < 60){
        pickupEmber();
      }
    }
  }

  // 지하실 분위기: 떠다니는 먼지
  if(curMapId === "basement" && !transition && Math.random() < 0.5){
    spawnParticles(camX + rand(-20, VIEW_W + 20), rand(90, GROUND_Y - 20),
      { n: 1, col: ["#4a5d4a","#3a4a5a","#2f3b30"], sp0: 1, sp1: 8, l0: 1.6, l1: 3.4, grav: 6, drag: 0.995, r0: 1, r1: 2 });
  }
  // 불의 마을 분위기: 피어오르는 잉걸불
  if(mapTheme === "volcano" && !transition && Math.random() < 0.6){
    spawnParticles(camX + rand(-20, VIEW_W + 20), GROUND_Y - rand(0, 30),
      { n: 1, col: ["#ff7b3a","#ffb35c","#ff5030"], sp0: 6, sp1: 30, ang: -Math.PI/2, spread: .5, l0: 1.2, l1: 3.0, grav: -22, drag: 0.994, r0: 1, r1: 3, add: true });
  }

  // --- 자동 저장 / 초기화(F2 두 번)
  saveTimer -= dt;
  if(saveTimer <= 0){ saveTimer = 8; saveGame(); }
  if(pressed["F2"]){
    if(resetArm > 0){
      try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
      location.reload();
    }else{
      resetArm = 3;
      addFloatText(player.x, player.y - P.h - 60, "저장 초기화 — 3초 안에 F2 한 번 더!", "#f87171");
    }
  }
  resetArm = Math.max(0, resetArm - dt);
  saveFlash = Math.max(0, saveFlash - dt);

  updatePlayer(dt);
  updateMonsters(dt);
  updateBoss(dt);
  updateSpikes(dt);
  updateEprojs(dt);
  updateProjectiles(dt);
  updateFields(dt);
  updateMeltdown(dt);
  updateParticles(dt);
  combo.update(dt);
  for(let i=explosions.length-1;i>=0;i--){
    explosions[i].t += dt;
    if(explosions[i].t >= explosions[i].life) explosions.splice(i,1);
  }
  for(let i=dmgNumbers.length-1;i>=0;i--){
    const n = dmgNumbers[i]; n.t += dt;
    if(n.t >= n.life) dmgNumbers.splice(i,1);
  }
  for(let i=floatTexts.length-1;i>=0;i--){
    const f = floatTexts[i]; f.t += dt;
    if(f.t >= f.life) floatTexts.splice(i,1);
  }
  for(let i=rankBanners.length-1;i>=0;i--){
    rankBanners[i].t += dt;
    if(rankBanners[i].t >= rankBanners[i].life) rankBanners.splice(i,1);
  }
  if(questState.banner){
    questState.banner.t += dt;
    if(questState.banner.t >= questState.banner.life) questState.banner = null;
  }
  juice.trauma = Math.max(0, juice.trauma - dt*1.6);
  juice.flash = Math.max(0, juice.flash - dt*2);
  for(const k in pressed) pressed[k] = false;
  mouse.clicked = false;
}

// ============================== RENDER ==============================
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
ctx.imageSmoothingEnabled = false;
let camX = 0, camY = 0;

// 마우스 (타이틀/옵션 버튼용) — CSS 스케일 보정
const mouse = { x: 0, y: 0, clicked: false };
cvs.addEventListener("click", e=>{
  const r = cvs.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (cvs.width / r.width);
  mouse.y = (e.clientY - r.top) * (cvs.height / r.height);
  mouse.clicked = true;
});

function render(){
  const targetCamX = clamp(player.x - VIEW_W/2, 0, Math.max(0, mapW - VIEW_W));
  const targetCamY = clamp(player.y - VIEW_H*0.62, 0, Math.max(0, mapH - VIEW_H));
  camX = lerp(camX, targetCamX, 0.12);
  camY = lerp(camY, targetCamY, 0.12);
  const sh = juice.shakeOffset();

  // --- 하늘 / 배경 톤
  const sky = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  if(mapTheme === "campus"){
    sky.addColorStop(0, "#1a1533"); sky.addColorStop(0.6, "#2c2350"); sky.addColorStop(1, "#3a2b55");
  }else if(mapTheme === "basement"){
    sky.addColorStop(0, "#07080c"); sky.addColorStop(0.6, "#0d1013"); sky.addColorStop(1, "#12100e");
  }else if(mapTheme === "school"){
    sky.addColorStop(0, "#14100c"); sky.addColorStop(1, "#1c1610");
  }else if(mapTheme === "town"){
    sky.addColorStop(0, "#241a33"); sky.addColorStop(0.55, "#3e2c45"); sky.addColorStop(1, "#5a3f47");
  }else if(mapTheme === "harbor"){
    sky.addColorStop(0, "#1a2540"); sky.addColorStop(0.5, "#2b3f63"); sky.addColorStop(1, "#4a5f7d");
  }else if(mapTheme === "volcano"){
    sky.addColorStop(0, "#2a0f10"); sky.addColorStop(0.5, "#4a1512"); sky.addColorStop(1, "#7a2410");
  }else{
    sky.addColorStop(0, "#141a33"); sky.addColorStop(0.6, "#23294d"); sky.addColorStop(1, "#31294a");
  }
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // 달/해 (실내·지하실 제외)
  if(mapTheme === "harbor"){
    ctx.fillStyle = "#ffe9b0";
    ctx.beginPath(); ctx.arc(980 - camX*0.05, 130, 44, 0, Math.PI*2); ctx.fill();
  }else if(mapTheme !== "basement" && mapTheme !== "school" && mapTheme !== "volcano"){
    ctx.fillStyle = "#e9e6ff";
    ctx.beginPath(); ctx.arc(1080 - camX*0.05, 110, 38, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = mapTheme === "campus" ? "#1a1533" : mapTheme === "town" ? "#241a33" : "#141a33";
    ctx.beginPath(); ctx.arc(1094 - camX*0.05, 100, 34, 0, Math.PI*2); ctx.fill();
  }

  ctx.save();
  ctx.translate(sh.x, sh.y);

  // --- 배경 (테마별)
  if(mapTheme === "campus"){
    for(let i = 0; i < 10; i++){
      const par = i % 2 === 0 ? 0.35 : 0.55;
      const tx = 100 + i * 340 - camX * par;
      if(tx < -200 || tx > VIEW_W + 200) continue;
      const th = 240 + (i * 67 % 140);
      ctx.fillStyle = i % 2 === 0 ? "#241d45" : "#322a5e";
      ctx.fillRect(tx - 40, GROUND_Y - th, 80, th);
      ctx.fillStyle = i % 2 === 0 ? "#1c1638" : "#292250";
      ctx.beginPath();
      ctx.moveTo(tx - 52, GROUND_Y - th);
      ctx.lineTo(tx, GROUND_Y - th - 70);
      ctx.lineTo(tx + 52, GROUND_Y - th);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,210,120,.5)";
      for(let wy = 0; wy < 3; wy++){
        ctx.fillRect(tx - 18, GROUND_Y - th + 34 + wy*56, 10, 16);
        ctx.fillRect(tx + 8,  GROUND_Y - th + 34 + wy*56, 10, 16);
      }
    }
  }else if(mapTheme === "basement"){
    // 벽돌 벽 (패럴럭스 약간)
    const bx0 = -((camX * 0.5) % 80);
    for(let row = 0; row * 40 < VIEW_H; row++){
      const oy = row * 40;
      const off = (row % 2) ? 40 : 0;
      for(let bx = bx0 - 80; bx < VIEW_W + 80; bx += 80){
        ctx.fillStyle = (Math.floor((bx + off) / 80) + row) % 5 === 0 ? "#171a1e" : "#1b1f22";
        ctx.fillRect(bx + off, oy, 76, 36);
      }
    }
    // 이끼/얼룩
    for(let i = 0; i < 6; i++){
      const sx = ((i * 520) - camX * 0.5) % (VIEW_W + 200);
      const x = sx < -100 ? sx + VIEW_W + 200 : sx;
      ctx.fillStyle = "rgba(40,60,40,.25)";
      ctx.beginPath(); ctx.ellipse(x, 140 + (i*63 % 260), 60, 34, 0, 0, Math.PI*2); ctx.fill();
    }
  }else if(mapTheme === "forest"){
    for(const t of bgTrees){
      const par = t.layer === 0 ? 0.35 : 0.6;
      const x = t.x - camX * par;
      if(x < -120 || x > VIEW_W + 120) continue;
      ctx.fillStyle = t.layer === 0 ? "#1a2140" : "#252c52";
      ctx.fillRect(x - 8, GROUND_Y - t.h, 16, t.h);
      ctx.beginPath();
      ctx.moveTo(x - 46, GROUND_Y - t.h + 30);
      ctx.lineTo(x, GROUND_Y - t.h - 70);
      ctx.lineTo(x + 46, GROUND_Y - t.h + 30);
      ctx.closePath(); ctx.fill();
    }
  }

  ctx.translate(-camX, -camY);
  drawWorldBackdrop();

  // --- 지형
  const GT = {
    campus:   { base:"#3a3f55", top:"#565f7d" },
    basement: { base:"#22201c", top:"#33302a" },
    school:   { base:"#3b2c1d", top:"#5a4126" },
    town:     { base:"#4a3d33", top:"#6b5a45" },
    harbor:   { base:"#5a4130", top:"#7a5738" },
    forest:   { base:"#2d3b2d", top:"#4a6741" },
    volcano:  { base:"#2e1712", top:"#5a2418" },
  };
  for(const pf of platforms){
    const g = GT[mapTheme] || GT.forest;
    if(pf.solidGround){
      ctx.fillStyle = g.base; ctx.fillRect(pf.x, pf.y, pf.w, pf.h);
      ctx.fillStyle = g.top;  ctx.fillRect(pf.x, pf.y, pf.w, 10);
      ctx.fillStyle = "rgba(0,0,0,.2)";
      const step = mapTheme === "harbor" ? 40 : 84;   // 항구=널빤지
      for(let bx = 0; bx < pf.w; bx += step) ctx.fillRect(pf.x + bx, pf.y + 10, 2, pf.h - 10);
    }else{
      ctx.fillStyle = g.base; ctx.fillRect(pf.x, pf.y, pf.w, pf.h);
      ctx.fillStyle = g.top;  ctx.fillRect(pf.x, pf.y, pf.w, 5);
    }
  }

  // --- 계단(대각선) 렌더
  for(const s of stairs){
    const xa = Math.min(s.x0, s.x1), xb = Math.max(s.x0, s.x1);
    const ya = (xa === s.x0) ? s.y0 : s.y1, yb = (xb === s.x0) ? s.y0 : s.y1;
    const steps = Math.max(4, Math.round((xb - xa) / 42));
    for(let i = 0; i < steps; i++){
      const t0 = i / steps, t1 = (i + 1) / steps;
      const sx = xa + (xb - xa) * t0, sy = ya + (yb - ya) * t0;
      const nx = xa + (xb - xa) * t1;
      ctx.fillStyle = "#43301e";
      ctx.fillRect(sx, sy, (nx - sx) + 2, 14);                 // 디딤판
      ctx.fillStyle = "#5a4126";
      ctx.fillRect(sx, sy, (nx - sx) + 2, 5);
      ctx.fillStyle = "#2c2013";

  // --- 안내판
  ctx.textAlign = "center";

  // --- 포탈
  for(const p of portals){
    const py = p.y ?? GROUND_Y;
    const pulse = 0.6 + Math.sin(performance.now()/300) * 0.25;

        ctx.fillRect(p.x - 32, py - 128, 64, 128);

      }
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = pulse;
      const pg = ctx.createRadialGradient(p.x, py - 65, 4, p.x, py - 65, 46);
      pg.addColorStop(0, "#ffffff");
      pg.addColorStop(0.4, tint);
      pg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.ellipse(p.x, py - 65, 34, 58, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.textAlign = "center";
    ctx.font = "bold 13px sans-serif"; ctx.fillStyle = "#c4b5fd";
    ctx.fillText(p.label, p.x, py - 152);
    if(!dialog && !transition && Math.abs(player.x - p.x) < 46 && Math.abs(player.y - py) < 90){
      ctx.fillStyle = "rgba(10,12,24,.8)";
      roundRect(p.x - 44, py - 186, 88, 22, 6); ctx.fill();
      ctx.fillStyle = "#8be9fd";
      ctx.fillText(p.door ? "↑ 들어가기" : p.down ? "↑ 내려가기" : "↑ 이동", p.x, py - 170);
    }
  }

  // --- 숲: 시험장 가시문 / 아레나 벽 / 가시 / 씨앗
  if(curMapId === "forest"){
    if(!boss.defeated && !bossReady()){
      drawThornWall(GATE_X);
      ctx.textAlign = "center";
      ctx.font = "bold 13px sans-serif"; ctx.fillStyle = "#f0abfc";
      ctx.fillText("시험 자격 필요 — 퀘스트를 모두 완료하자", GATE_X, GROUND_Y - 190);
    }
    if(boss.active && BOSS_M && !BOSS_M.dead){
      drawThornWall(ARENA_L);
      drawThornWall(ARENA_R);
    }
    for(const s of spikes){
      if(s.warn > 0){
        const pulse = 0.35 + Math.abs(Math.sin(performance.now()/90)) * 0.35;
        ctx.fillStyle = `rgba(239,68,68,${pulse})`;
        ctx.fillRect(s.x - 46, GROUND_Y - 6, 92, 6);
        ctx.textAlign = "center";
        ctx.font = "bold 18px sans-serif"; ctx.fillStyle = "#ef4444";
        ctx.fillText("!", s.x, GROUND_Y - 14);
      }else if(s.active > 0){
        const hgt = 72 * Math.min(1, s.active / 0.32);
        ctx.fillStyle = "#5e7a4a";
        for(let ti = -1; ti <= 1; ti++){
          ctx.beginPath();
          ctx.moveTo(s.x + ti*26 - 12, GROUND_Y);
          ctx.lineTo(s.x + ti*26, GROUND_Y - hgt * (ti === 0 ? 1 : 0.7));

          ctx.closePath(); ctx.fill();

      }
    }
    for(const e of eprojs){
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const eg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r*2);

      ctx.beginPath(); ctx.arc(e.x, e.y, e.r*2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // --- 지하실: 횃불 + 의문의 문
  if(curMapId === "basement"){
    for(const tx of mapTorches){
      const ty = GROUND_Y - 250;

      ctx.fillStyle = "#3a3128";
      ctx.fillRect(tx - 3, ty, 6, 30);

      const fg = ctx.createRadialGradient(tx, ty - 6, 2, tx, ty - 6, 60 + fl*3);

      ctx.beginPath(); ctx.arc(tx, ty - 6, 60 + fl*3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#ffe08a";
      ctx.beginPath();
      ctx.moveTo(tx - 5, ty); ctx.lineTo(tx, ty - 16 - fl); ctx.lineTo(tx + 5, ty);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      if(Math.random() < 0.15)
        spawnParticles(tx, ty - 12, { n: 1, col: ["#ffb35c","#ffd27f"], sp0: 6, sp1: 26, l0: .4, l1: .9, add: true, grav: -50, r0: 1, r1: 2 });
    }
    if(mapDoor) drawMysteryDoor(mapDoor.x);
    if(questState.idx === QI_TOME) drawTome();
  }

  // --- 도서관: 금서 구역 서가
  if(curMapId === "library") drawBannedShelf();

  // --- 불의 마을: 『멸화의 불씨』 회수 지점
  if(curMapId === "firevil" && questState.idx === QI_M2_EMBER) drawEmberPickup();

  // --- 화염 장판
  for(const f of fields){
    const fdur = f.dur ?? SKILL.field.dur;
    const flick = 0.75 + Math.sin(f.t*30)*0.15;
    const fade = f.t > fdur - 0.5 ? (fdur - f.t)/0.5 : 1;
    const fh = 34 + (f.tier||0)*8;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = 0.55 * flick * fade;
    const fg = ctx.createLinearGradient(0, f.y - fh, 0, f.y);
    if(f.tier === 2){
      fg.addColorStop(0, "rgba(90,160,255,0)");
      fg.addColorStop(1, "#5ab0ff");
    }else{
      fg.addColorStop(0, "rgba(255,140,40,0)");
      fg.addColorStop(1, f.tier === 1 ? "#ffa54a" : "#ff8c3a");
    }
    ctx.fillStyle = fg;
    ctx.fillRect(f.x - f.w/2, f.y - fh, f.w, fh);
    ctx.restore();
  }

  // --- NPC (교사·양호·매점·안내·주민 등)
  for(const n of npcs) drawNPC(n);

  // --- 몬스터
  for(const m of monsters){
    if(m.dead) continue;
    const d = MOB_DEFS[m.type];
    const r = mobRect(m);
    const squish = m.type === "slime" ? Math.sin(m.animT * 6) * 3 : 0;
    ctx.fillStyle = m.hurtFlash > 0 ? "#ffffff" : d.color;
    if(m.type === "boss"){
      const tele = boss.active && boss.state.startsWith("windup") && Math.floor(performance.now()/90) % 2 === 0;
      const p2 = bossPhase2();
      const flash = m.hurtFlash > 0 || tele;
      const sway = Math.sin(m.animT * 1.6) * 3;
      ctx.fillStyle = flash ? "#fff" : "#4a3b28";
      ctx.fillRect(m.x - 30, m.y - d.h + 26, 60, d.h - 26);
      ctx.fillStyle = flash ? "#fff" : "#3d3122";
      ctx.fillRect(m.x - 30 - 18, m.y - d.h + 44 + sway, 20, 54);
      ctx.fillRect(m.x + 30 - 2,  m.y - d.h + 44 - sway, 20, 54);
      ctx.fillStyle = flash ? "#fff" : (p2 ? "#6b8747" : d.color);
      ctx.beginPath();
      ctx.ellipse(m.x, m.y - d.h + 18, 52, 30, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.save();
      if(p2) ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = p2 ? "#ff5040" : "#ffd93d";
      ctx.fillRect(m.x - 14 + m.dir*4, m.y - d.h + 40, 8, 9);
      ctx.fillRect(m.x + 6 + m.dir*4,  m.y - d.h + 40, 8, 9);
      ctx.restore();
      if(m.hp < m.maxHp * 0.75){
        ctx.strokeStyle = "rgba(255,220,120,.5)"; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(m.x - 10, m.y - 60); ctx.lineTo(m.x + 2, m.y - 40); ctx.lineTo(m.x - 6, m.y - 20);
        ctx.stroke();
      }
    }else if(m.type === "dummy"){
      ctx.fillStyle = "#7a5a33";
      ctx.fillRect(m.x - 5, m.y - d.h, 10, d.h);
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#c8a35f";
      ctx.fillRect(m.x - 16, m.y - d.h, 32, 26);
      ctx.fillStyle = "#3a2c17";
      ctx.fillRect(m.x - 10, m.y - d.h + 8, 5, 5);
      ctx.fillRect(m.x + 5,  m.y - d.h + 8, 5, 5);
    }else if(m.type === "slime"){
      ctx.beginPath();
      ctx.ellipse(m.x, m.y - d.h/2, d.w/2 + squish, d.h/2 - squish*0.6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.fillRect(m.x - 8 + m.dir*3, m.y - d.h/2 - 4, 4, 6);
      ctx.fillRect(m.x + 4 + m.dir*3, m.y - d.h/2 - 4, 4, 6);
    }else if(m.type === "bat"){
      const flap = Math.sin(m.animT * 12) * 7;
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#2a2438";
      // 날개
      ctx.beginPath();
      ctx.moveTo(m.x, m.y - 10);
      ctx.lineTo(m.x - 20, m.y - 17 - flap);
      ctx.lineTo(m.x - 14, m.y - 8);
      ctx.lineTo(m.x - 7, m.y - 11);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(m.x, m.y - 10);
      ctx.lineTo(m.x + 20, m.y - 17 - flap);
      ctx.lineTo(m.x + 14, m.y - 8);
      ctx.lineTo(m.x + 7, m.y - 11);
      ctx.closePath(); ctx.fill();
      // 몸통
      ctx.beginPath(); ctx.ellipse(m.x, m.y - 9, 7, 8, 0, 0, Math.PI*2); ctx.fill();
      // 귀
      ctx.beginPath();
      ctx.moveTo(m.x - 5, m.y - 15); ctx.lineTo(m.x - 3, m.y - 22); ctx.lineTo(m.x - 1, m.y - 15);
      ctx.moveTo(m.x + 5, m.y - 15); ctx.lineTo(m.x + 3, m.y - 22); ctx.lineTo(m.x + 1, m.y - 15);
      ctx.fill();
      // 눈
      ctx.fillStyle = m.hurtFlash > 0 ? "#000" : "#ff5a5a";
      ctx.fillRect(m.x - 4, m.y - 11, 2, 3);
      ctx.fillRect(m.x + 2, m.y - 11, 2, 3);
    }else if(m.type === "ember"){
      const cy = m.y - d.h/2, fl = Math.sin(m.animT * 10) * 3;

      g.addColorStop(0, m.hurtFlash > 0 ? "rgba(255,255,255,.95)" : "rgba(255,220,150,.9)");
      g.addColorStop(0.5, "rgba(255,120,40,.5)"); g.addColorStop(1, "rgba(255,60,20,0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, cy, 26, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#ffd27f";
      ctx.beginPath();
      ctx.moveTo(m.x, cy - 16 - fl); ctx.lineTo(m.x + 9, cy + 8); ctx.lineTo(m.x - 9, cy + 8);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#3a1206";
      ctx.fillRect(m.x - 5 + m.dir*2, cy - 2, 3, 4);
      ctx.fillRect(m.x + 2 + m.dir*2, cy - 2, 3, 4);
    }else if(m.type === "firelord"){
      const flash = m.hurtFlash > 0;
      const sway = Math.sin(m.animT * 2) * 3;
      // 후광
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const g = ctx.createRadialGradient(m.x, m.y - d.h/2, 8, m.x, m.y - d.h/2, 90);
      g.addColorStop(0, "rgba(255,120,40,.6)"); g.addColorStop(1, "rgba(255,50,20,0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x, m.y - d.h/2, 90, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // 몸통(용암 갑주)
      ctx.fillStyle = flash ? "#fff" : "#3a140c";
      ctx.fillRect(m.x - 32, m.y - d.h + 30, 64, d.h - 30);
      ctx.fillStyle = flash ? "#fff" : "#5a1e10";
      ctx.fillRect(m.x - 32 - 16, m.y - d.h + 50 + sway, 20, 58);
      ctx.fillRect(m.x + 32 - 4,  m.y - d.h + 50 - sway, 20, 58);

      ctx.save(); if(!flash) ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = flash ? "#fff" : "#ff7b3a"; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(m.x - 18, m.y - d.h + 44); ctx.lineTo(m.x - 4, m.y - d.h + 74); ctx.lineTo(m.x - 14, m.y - 40);
      ctx.moveTo(m.x + 16, m.y - d.h + 50); ctx.lineTo(m.x + 4, m.y - d.h + 84);

      ctx.moveTo(m.x + 24, m.y - d.h + 6); ctx.lineTo(m.x + 40, m.y - d.h - 22); ctx.lineTo(m.x + 12, m.y - d.h - 2);
      ctx.fill();
      // 눈
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = flash ? "#fff" : "#ffd93d";
      ctx.fillRect(m.x - 15 + m.dir*3, m.y - d.h + 12, 9, 7);
      ctx.fillRect(m.x + 6 + m.dir*3,  m.y - d.h + 12, 9, 7);
      ctx.restore();
    }else{
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : "#e8d8b0";
      ctx.fillRect(r.x + 6, r.y + 14, d.w - 12, d.h - 14);
      ctx.fillStyle = m.hurtFlash > 0 ? "#fff" : d.color;
      ctx.beginPath();
      ctx.ellipse(m.x, r.y + 12, d.w/2 + 6, 14, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.fillRect(m.x - 8 + m.dir*3, r.y + 20, 4, 6);

      const bw = 44;
      ctx.fillStyle = "rgba(0,0,0,.6)";
      ctx.fillRect(m.x - bw/2, r.y - 14, bw, 6);
      ctx.fillStyle = "#ef4444";
      ctx.fillRect(m.x - bw/2, r.y - 14, bw * clamp(m.hp / m.maxHp, 0, 1), 6);
    }
  }

  // --- 플레이어
  drawPlayer();
  if(gameState !== "title" && player.infernoOn) drawInfernoBeam();

  // --- 멸화 운석 (월드 좌표)
  if(meteors.length) drawMeteors();

  // --- 투사체
  for(const pr of projectiles){
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    // 스킬 레벨 티어별 색: 0=주황, 1=밝은 금빛, 2(MAX)=푸른 화염
    const tier = pr.tier || 0;
    const core = tier === 2 ? "#eef7ff" : "#fff3d6";
    const mid  = tier === 2 ? "#7cc4ff" : tier === 1 ? "#ffd27f" : "#ffb35c";
    const edge = tier === 2 ? "rgba(80,140,255,0)" : "rgba(255,100,30,0)";
    const glowMul = 2.2 + tier * 0.35;
    if(pr.type === "lance"){
      const g = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, pr.r*3);
      g.addColorStop(0, core);
      g.addColorStop(0.4, tier === 2 ? "#5ab0ff" : "#ff9d4d");
      g.addColorStop(1, edge);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(pr.x, pr.y, pr.r*(3.4 + tier*0.4), pr.r*1.3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = tier === 2 ? "#dceeff" : "#fff0c0";
      ctx.beginPath();
      ctx.ellipse(pr.x + sign(pr.vx)*pr.r*1.6, pr.y, pr.r*1.4, pr.r*0.6, 0, 0, Math.PI*2);
      ctx.fill();
    }else{
      const g = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, pr.r*glowMul);
      g.addColorStop(0, core);
      g.addColorStop(0.4, mid);
      g.addColorStop(1, edge);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r*glowMul, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // --- 폭발 링
  for(const e of explosions){
    const k = e.t / e.life;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = `rgba(${e.col || "255,170,80"},${1-k})`;
    ctx.lineWidth = 6 * (1-k) + 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.4 + k*0.6), 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // --- 파티클
  for(const p of particles){
    const k = 1 - p.t / p.life;
    ctx.save();
    if(p.add) ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = k;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * k, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // --- 데미지 넘버 (옵션으로 끌 수 있음)
  if(OPTS.dmgNum) for(const n of dmgNumbers){
    const k = n.t / n.life;
    const y = n.y - k*46;
    const scale = n.crit ? (k < 0.15 ? lerp(1.8, 1.2, k/0.15) : 1.2) : 1;
    ctx.save();
    ctx.globalAlpha = 1 - k*k;
    ctx.font = `bold ${Math.floor((n.crit?26:19)*scale)}px sans-serif`;
    ctx.textAlign = "center";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.7)";
    ctx.strokeText(n.val, n.x, y);
    ctx.fillStyle = n.crit ? "#ffb020" : "#ffe9c9";
    ctx.fillText(n.val, n.x, y);
    ctx.restore();
  }

  // --- 플로팅 텍스트
  for(const f of floatTexts){
    const k = f.t / f.life;
    ctx.save();
    ctx.globalAlpha = 1 - k*k;
    ctx.font = "bold 17px sans-serif";
    ctx.textAlign = "center";
    ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.7)";
    ctx.strokeText(f.text, f.x, f.y - k*40);

    ctx.fillText(f.text, f.x, f.y - k*40);

  ctx.restore();

  if(juice.flash > 0){
    ctx.fillStyle = `rgba(255,240,200,${juice.flash})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  // 멸화: 하늘이 붉게 갈라지는 오버레이
  if(meltFlash > 0){
    const tier = skillTier("meltdown");
    ctx.fillStyle = tier === 2 ? `rgba(120,180,255,${meltFlash * 0.28})` : `rgba(255,70,30,${meltFlash * 0.3})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    const vg = ctx.createRadialGradient(VIEW_W/2, VIEW_H*0.4, 120, VIEW_W/2, VIEW_H*0.4, VIEW_W*0.7);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, tier === 2 ? `rgba(20,40,90,${meltFlash*0.5})` : `rgba(90,15,10,${meltFlash*0.5})`);
    ctx.fillStyle = vg; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
  if(player.hurtFlash > 0){
    ctx.fillStyle = `rgba(220,40,40,${player.hurtFlash * 0.5})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }

  // 지하실 비네트 (시야 제한 — 플레이어 주변만 은은히 밝게)
  if(mapTheme === "basement"){
    const plsx = player.x - camX, plsy = player.y - camY - 40;
    const vg = ctx.createRadialGradient(plsx, plsy, 120, plsx, plsy, 640);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(0.6, "rgba(3,4,7,0.4)");
    vg.addColorStop(1, "rgba(2,3,5,0.82)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }

  if(gameState === "title"){
    renderTitle();
  }else{
    renderHUD();
  }

  // --- 맵 전환 페이드
  if(transition){
    const a = transition.phase === "out" ? Math.min(1, transition.t) : Math.max(0, 1 - transition.t);
    ctx.fillStyle = `rgba(5,6,14,${a})`;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }
}

function renderMinimap(){
  const bx = VIEW_W - 316, by = 14, bw = 300, bh = 96;
  ctx.save();
  ctx.fillStyle = "rgba(10,12,24,.72)";
  roundRect(bx, by, bw, bh, 10); ctx.fill();
  // 맵 이름
  ctx.textAlign = "left";
  ctx.font = "bold 12px sans-serif"; ctx.fillStyle = "#c4b5fd";
  ctx.fillText(MAPS[curMapId].name, bx + 12, by + 18);
  ctx.textAlign = "right";
  ctx.font = "10px sans-serif"; ctx.fillStyle = "#64748b";
  ctx.fillText("M 월드맵", bx + bw - 10, by + 18);
  // 지도 영역
  const cx0 = bx + 10, cy0 = by + 26, cw = bw - 20, ch = bh - 36;
  const s = Math.min(cw / mapW, ch / mapH);
  const ox = cx0 + (cw - mapW * s) / 2, oy = cy0 + (ch - mapH * s) / 2;
  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.fillRect(cx0, cy0, cw, ch);
  // 지형
  ctx.fillStyle = "#5a637f";
  for(const pf of platforms){
    ctx.fillRect(ox + pf.x * s, oy + pf.y * s, Math.max(1.5, pf.w * s), Math.max(1.5, pf.h * s * 0.6));
  }
  // 계단
  ctx.strokeStyle = "#5a637f"; ctx.lineWidth = 1.5;
  for(const st of stairs){
    ctx.beginPath();
    ctx.moveTo(ox + st.x0 * s, oy + st.y0 * s);
    ctx.lineTo(ox + st.x1 * s, oy + st.y1 * s);
    ctx.stroke();
  }
  // 포탈/문
  for(const p of portals){
    const py2 = p.y ?? GROUND_Y;
    ctx.fillStyle = p.tint || "#8b5cf6";
    ctx.beginPath(); ctx.arc(ox + p.x * s, oy + (py2 - 40) * s, 2.4, 0, Math.PI*2); ctx.fill();
  }
  // NPC
  ctx.fillStyle = "#fbbf24";
  for(const n of npcs){
    const ny = n.y ?? GROUND_Y;
    ctx.fillRect(ox + n.x * s - 1.5, oy + (ny - 40) * s - 1.5, 3, 3);
  }
  // 몬스터
  for(const m of monsters){
    if(m.dead) continue;
    ctx.fillStyle = m.type === "dummy" ? "#9a7b4f" : m.type === "boss" ? "#ff5040" : "#ef4444";
    ctx.fillRect(ox + m.x * s - 1.5, oy + (m.y - 20) * s - 1.5, m.type === "boss" ? 5 : 3, m.type === "boss" ? 5 : 3);
  }
  // 플레이어 (깜빡임)
  const blink = 0.6 + Math.sin(performance.now()/180) * 0.4;
  ctx.save();
  ctx.globalAlpha = blink;
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(ox + player.x * s, oy + (player.y - 24) * s, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
}
